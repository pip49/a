
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 문제풀이</title>
    <style>
        /* 기존 디자인 유지 및 보강 */
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }

        /* 상단 헤더 및 모드 스위치 */
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; margin-bottom: 15px; padding-bottom: 10px; }
        h1 { font-size: 1.3rem; color: #2c3e50; margin: 0; }
        .btn-mode { padding: 5px 10px; font-size: 0.8rem; background: #ecf0f1; color: #7f8c8d; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; }
        .btn-mode.active { background: #2ecc71; color: white; border-color: #27ae60; }

        /* 문제 및 정답 영역 가독성 향상 */
	.question {
    font-size: 1.15rem;
    font-weight: bold;
    margin-bottom: 30px; /* 보기와의 간격을 넓힙니다 */
    line-height: 1.8;
    color: #2c3e50; /* 문제 텍스트를 더 진한 색으로 변경 */
    word-break: keep-all;
}

        .question img, .answer-box img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 6px; }
        .question audio, .answer-box audio { width: 100%; margin: 10px 0; }

        .answer-box { display: none; background: #e8f4fd; border-left: 5px solid #3498db; padding: 15px; margin-top: 20px; border-radius: 4px; font-size: 1rem; line-height: 1.6; word-break: keep-all; }

        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; font-weight: bold; }
        .btn-prev { background-color: #95a5a6; color: white; }
        .btn-check { background-color: #34495e; color: white; }
        .btn-next { background-color: #3498db; color: white; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #dcdde1; cursor: not-allowed; }

        .info { font-size: 0.85rem; color: #95a5a6; margin-top: 20px; text-align: center; }
        a { color: #3498db; text-decoration: underline; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-row">
        <h1>⚡ 전기기능사 풀이</h1>
        <button id="modeBtn" class="btn-mode" onclick="toggleMode()">랜덤 모드</button>
    </div>

    <div id="quiz-count" style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;"></div>

    <div id="quiz-content">
        <div class="question" id="questionText">문제를 불러오는 중...</div>
        <div class="answer-box" id="answerBox">
            <strong>정답 및 해설:</strong> <br>
            <span id="answerText"></span>
        </div>
    </div>

    <div class="btn-group">
        <button id="prevBtn" class="btn-prev" onclick="prevQuiz()" style="display:none;">이전</button>
        <button class="btn-check" onclick="showAnswer()">정답 확인</button>
        <button class="btn-next" onclick="nextQuiz()">다음 문제</button>
    </div>

    <p class="info" id="statusInfo">모드를 선택하고 학습을 시작하세요.</p>
</div>

<script>
    // [문제 및 선택지, 정답] 형식
    // 여기에 모든 데이터를 넣으시면 됩니다.
	const quizData = [
  ["1. 다음 중 전하의 성질에 대한 설명으로 틀린 것은?<br>① 같은 종류의 전하는 흡인하고 다른 종류는 반발한다.<br>② 전하량은 보존된다.<br>③ 전하는 가장 뾰족한 부분에 많이 모이는 성질이 있다.<br>④ 자유전자가 과잉된 상태를 (-)대전이라 한다.", "1 (해설: 같은 종류의 전하는 반발하고, 다른 종류의 전하끼리 흡인합니다.)"],
  ["2. 어떤 도체에 5초 동안 20[C]의 전하가 이동하였다면 이때 흐르는 전류[A]는?<br>① 2<br>② 4<br>③ 5<br>④ 100", "2 (해설: 전류 I = Q / t = 20 / 5 = 4[A]입니다.)"],
  ["3. 1[kWh]를 열량으로 환산하면 약 몇 [kcal]인가?<br>① 640<br>② 720<br>③ 860<br>④ 1000", "3 (해설: 1[kWh] = 860[kcal]는 반드시 암기해야 할 상수입니다.)"],
  ["4. 옴의 법칙을 바르게 나타낸 것은?<br>① I = V / R<br>② V = I / R<br>③ R = V * I<br>④ I = V * R", "1 (해설: 전류는 전압에 비례하고 저항에 반비례합니다.)"],
  ["5. 10[Ω] 저항 5개를 병렬로 접속했을 때의 합성저항은 몇 [Ω]인가?<br>① 2<br>② 5<br>③ 10<br>④ 50", "1 (해설: 병렬 합성저항 R = 저항값 / 개수 = 10 / 5 = 2[Ω]입니다.)"],
  ["6. 저항의 직렬회로에서 각 저항에 흐르는 전류의 크기는?<br>① 저항에 비례한다<br>② 저항에 반비례한다<br>③ 모두 같다<br>④ 모두 다르다", "3 (해설: 직렬회로에서는 어느 지점에서나 전류의 세기가 동일합니다.)"],
  ["7. 전력(P)의 단위가 아닌 것은?<br>① [W]<br>② [HP]<br>③ [J/s]<br>④ [Wh]", "4 (해설: [Wh]는 전력량이 단위입니다.)"],
  ["8. '자기력선의 방향은 오른나사를 돌릴 때 나사의 진행 방향과 같다'는 법칙은?<br>① 앙페르의 오른나사 법칙<br>② 플레밍의 왼손 법칙<br>③ 패러데이의 법칙<br>④ 렌츠의 법칙", "1 (해설: 전류와 자기장의 방향 관계를 나타냅니다.)"],
  ["9. 자속밀도 2[Wb/m²]인 자기장 속에 10[cm] 도선을 자기장과 수직으로 놓고 5[A]의 전류를 흘릴 때 도선이 받는 힘[N]은?<br>① 1<br>② 10<br>0.1<br>④ 0.01", "1 (해설: F = BIl sinθ = 2 * 5 * 0.1 * 1 = 1[N]입니다.)"],
  ["10. 유도기전력의 크기는 자속의 변화율에 비례한다는 법칙은?<br>① 렌츠의 법칙<br>② 패러데이의 법칙<br>③ 쿨롱의 법칙<br>④ 키르히호프의 법칙", "2 (해설: 렌츠는 방향, 패러데이는 크기를 결정합니다.)"],
  ["11. 전해액에 전류가 흐를 때 석출되는 물질의 양은 통과한 전기량에 비례한다는 법칙은?<br>① 렌츠의 법칙<br>② 패러데이의 법칙<br>③ 플레밍의 법칙<br>④ 비오-사바르의 법칙", "2 (해설: 전기분해에 관한 패러데이의 법칙입니다.)"],
  ["12. 비사인파(왜형파)의 구성 성분이 아닌 것은?<br>① 직류분<br>② 기본파<br>③ 고조파<br>④ 삼각파", "4 (해설: 비사인파는 직류분, 기본파, 고조파의 합성입니다.)"],

  ["20. 변압기의 원리는 무엇을 이용한 것인가?<br>① 자기포화 현상<br>② 정전유도 현상<br>③ 상호유도 현상<br>④ 자기이력 현상", "3 (해설: 1차측과 2차측 권선 사이의 상호유도 작용을 이용합니다.)"],
  ["21. 변압기 유(油)의 구비조건으로 틀린 것은?<br>① 절연내력이 클 것<br>② 인화점이 낮을 것<br>③ 점도가 낮을 것<br>④ 응고점이 낮을 것", "2 (해설: 화재 예방을 위해 인화점은 높아야 합니다.)"],

  ["25. 보호 계전기의 3요소가 아닌 것은?<br>① 단락 보호<br>② 지락 보호<br>③ 과부하 보호<br>④ 전압 보호", "4 (해설: 계전기는 주로 단락, 지락, 과부하를 감지합니다.)"],
  ["26. 금속관 공사에서 관의 굴곡 반지름은 관 안지름의 최소 몇 배 이상이어야 하는가?<br>① 3<br>② 6<br>③ 10<br>④ 12", "2 (해설: 굴곡 반지름은 안지름의 6배 이상입니다.)"],

    let history = [];
    let currentHistoryIndex = -1;
    let isRandomMode = true;
    let sequentialIndex = 0;

    function toggleMode() {
        isRandomMode = !isRandomMode;
        const modeBtn = document.getElementById('modeBtn');

        if (isRandomMode) {
            modeBtn.innerText = "랜덤 모드";
            modeBtn.classList.remove('active');
            history = [];
            currentHistoryIndex = -1;
        } else {
            modeBtn.innerText = "순차 모드";
            modeBtn.classList.add('active');
            sequentialIndex = 0;
        }
        nextQuiz();
    }

    function nextQuiz() {
        if (!quizData || quizData.length === 0) return;

        if (isRandomMode) {
            if (currentHistoryIndex >= history.length - 1) {
                const randomIndex = Math.floor(Math.random() * quizData.length);
                history.push(randomIndex);
                currentHistoryIndex++;
            } else {
                currentHistoryIndex++;
            }
            displayQuiz(history[currentHistoryIndex]);
        } else {
            if (sequentialIndex < quizData.length) {
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            } else {
                alert("마지막 문제입니다. 처음으로 돌아갑니다.");
                sequentialIndex = 0;
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            }
        }
        updatePrevButton();
    }

    function prevQuiz() {
        if (isRandomMode) {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                displayQuiz(history[currentHistoryIndex]);
            }
        } else {
            if (sequentialIndex > 1) {
                sequentialIndex -= 2;
                if (sequentialIndex < 0) sequentialIndex = 0;
                nextQuiz();
            }
        }
        updatePrevButton();
    }

    function displayQuiz(index) {
        const selected = quizData[index];
        document.getElementById('questionText').innerHTML = selected[0];
        document.getElementById('answerText').innerHTML = selected[1];
        document.getElementById('answerBox').style.display = 'none';

        const modeLabel = isRandomMode ? "랜덤" : "순차";
        document.getElementById('quiz-count').innerText = `[${modeLabel} 모드] 문항 번호: ${index + 1} / 전체 ${quizData.length}`;
        window.scrollTo(0, 0);
    }

    function updatePrevButton() {
        const prevBtn = document.getElementById('prevBtn');
        const canGoBack = isRandomMode ? (currentHistoryIndex > 0) : (sequentialIndex > 1);
        prevBtn.style.display = canGoBack ? 'block' : 'none';
    }

    function showAnswer() {
        document.getElementById('answerBox').style.display = 'block';
    }

    window.onload = nextQuiz;
</script>
