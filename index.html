
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티 랭귀지 헬퍼 (영/일)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .main-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-box { margin-top: 25px; padding: 20px; border-left: 5px solid #007bff; background: #f0f7ff; display: none; }
        .btn-voice { background-color: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-voice:hover { background-color: #5a6268; }
        ruby rt { color: #e83e8c; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 class="text-center mb-4">🌐 AI 언어 도우미</h2>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="eng-tab" data-bs-toggle="pill" onclick="changeMode('en')">영어 사전</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="jp-tab" data-bs-toggle="pill" onclick="changeMode('jp')">일본어 작문</button>
        </li>
    </ul>

    <div class="input-group mb-3">
        <input type="text" id="userInput" class="form-control" placeholder="단어 또는 문장을 입력하세요">
        <button class="btn btn-primary" onclick="handleSearch()">실행</button>
    </div>

    <div id="resultArea" class="result-box">
        <div id="loading" class="text-center" style="display:none;">검색 중...</div>
        <div id="content">
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
	const url = "https://api.dictionaryapi.dev/api/v2/entries/en/";

async function searchWord(word) {
    try {
        const response = await fetch(`${url}${word}`);
        const data = await response.json();

        // 발음기호 가져오기
        const phonetic = data[0].phonetic || data[0].phonetics[1]?.text;
        // 첫 번째 뜻과 예문 가져오기
        const definition = data[0].meanings[0].definitions[0].definition;
        const example = data[0].meanings[0].definitions[0].example || "예문이 없습니다.";

        // HTML에 결과 출력 (DOM 조작)
        document.getElementById('result').innerHTML = `
            <h3>${word}</h3>
            <p><strong>발음:</strong> ${phonetic}</p>
            <p><strong>뜻:</strong> ${definition}</p>
            <p><strong>예문:</strong> <em>${example}</em></p>
        `;
    } catch (error) {
        console.error("단어를 찾을 수 없습니다.");
    }
}
    /* 여기에 제가 이전에 알려드린 JavaScript 코드를 넣으시면 됩니다.
       1. 변수 선언 (audio 등)
       2. searchWord(word) - 영어 API 호출 함수
       3. translateToJapanese(text) - 일본어 번역 함수
       4. playVoice(text, lang) - TTS 음성 출력 함수
       5. handleSearch() - 버튼 클릭 시 모드에 따라 위 함수들을 실행하는 로직
    */
</script>

</body>
</html>
