
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3단계 2인 대화 학습</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --primary: #4ecdc4;
            --accent: #ffbc64;
            --text-jp: #ffffff;
            --text-kr: #a0a0a0;
            --text-full: #7bed9f;
        }
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container { width: 90%; max-width: 450px; text-align: center; padding: 20px 0; }

        .card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            min-height: 380px;
            display: flex; flex-direction: column; justify-content: flex-start;
            cursor: pointer; border: 1px solid #3d3d3d;
            text-align: left;
        }

        .situation-tag {
            display: inline-block;
            background: var(--primary);
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        ruby { ruby-align: center; }
        rt { font-size: 0.8rem; color: var(--primary); }

        .dialogue { font-size: 1.15rem; line-height: 1.8; color: var(--text-jp); margin-bottom: 20px; }
        .speaker { color: var(--accent); font-weight: bold; margin-right: 8px; }

        .content-box { display: none; border-top: 1px solid #444; padding-top: 15px; margin-top: 5px; }
        .kr-box { color: var(--text-kr); font-size: 0.95rem; line-height: 1.6; }
        .full-box { color: var(--text-full); font-size: 1.1rem; line-height: 1.8; position: relative; }

        .card.step-1 .kr-box { display: block; }
        .card.step-2 .kr-box { display: block; }
        .card.step-2 .full-box { display: block; }

        .word-box {
            font-size: 0.85rem; color: var(--accent);
            margin-top: auto; padding-top: 15px;
            background: rgba(255, 188, 100, 0.05); padding: 10px; border-radius: 10px;
        }

        .btn-next {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--primary); color: #1a1a1a; font-size: 1.2rem; font-weight: bold;
            cursor: pointer;
        }
        .hint { color: #666; font-size: 0.85rem; margin-top: 15px; }

        /* 재생 중 표시 */
        .playing { outline: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="card" onclick="toggleStep()">
        <div id="tag" class="situation-tag">상황 로딩 중</div>
        <div class="dialogue" id="jp-mixed"></div>
        <div class="content-box kr-box" id="kr-text"></div>
        <div class="content-box full-box" id="jp-full"></div>
        <div class="word-box" id="word-text"></div>
	<audio id="audio-player" controls style="width: 100%; margin-top: 15px; background: #f1f3f4; border-radius: 8px;"></audio>
    </div>
    <button class="btn-next" onclick="nextSentence()">다른 상황 보기</button>
    <p class="hint">클릭: 해석 → 전체 문장 & 음성 듣기 → 초기화</p>
</div>

<script>
    const studyData = [
        {
            tag: "길 찾기 - 지하철역",
            mixed: "<span class='speaker'>A:</span> すみません、<ruby>駅<rt>えき</rt></ruby>은 어디인가요?<br>" +
                   "<span class='speaker'>B:</span> 저기 <ruby>信号<rt>しんごう</rt></ruby>를 <ruby>右<rt>みぎ</rt></ruby>로 꺾으면 바로 있어요.<br>" +
                   "<span class='speaker'>A:</span> 아, 저기 말씀이시죠? <ruby>助<rt>たす</rt></ruby>かりました！",
            kr: "A: 죄송합니다, 역은 어디인가요?<br>B: 저기 신호를 오른쪽으로 꺾으면 바로 있어요.<br>A: 아, 저기 말씀이시죠? 도움이 되었습니다!",
            full: [
                { s: "A", t: "すみません、駅はどこですか？" },
                { s: "B", t: "あそこの信号を右に曲がるとすぐありますよ。" },
                { s: "A", t: "あ、あそこのことですね？助かりました！" }
            ],
            audio: "mp3/jp2.mp3",
            words: "• 信号(しんごう): 신호 • 右(みぎ): 오른쪽 • 曲がる(마がる): 꺾다/돌다 • 助かる(たすかる): 도움되다"
        },



	    {
    tag: "길 찾기 - 백화점 위치",
    mixed: "<span class='speaker'>A:</span> すみません、이 <ruby>近<rt>ちか</rt></ruby>くに <ruby>百貨店<rt>ひゃっかてん</rt></ruby> 있습니까?<br>" +
           "<span class='speaker'>B:</span> 네, <ruby>交差点<rt>こうさてん</rt></ruby>을 건너면 바로 <ruby>左<rt>ひだり</rt></ruby>에 보여요.<br>" +
           "<span class='speaker'>A:</span> <ruby>交差点<rt>こうさてん</rt></ruby> 건너서 왼쪽이군요. 감사합니다!",
    kr: "A: 죄송합니다, 이 근처에 백화점이 있나요?<br>B: 네, 교차로를 건너면 바로 왼쪽에 보여요.<br>A: 교차로 건너서 왼쪽이군요. 감사합니다!",
    full: [
        { s: "A", t: "すみません、この近くに百貨店은ありますか？" },
        { s: "B", t: "はい、交差点を渡るとすぐ左に見えますよ。" },
        { s: "A", t: "交差点を渡って左ですね。ありがとうございます！" }
    ],
    words: "• 百貨店(ひゃっかてん): 백화점 • 交差点(こうさてん): 교차로 • 渡る(わたる): 건너다 • 左(ひだり): 왼쪽"
},
{
    tag: "길 찾기 - 편의점 찾기",
    mixed: "<span class='speaker'>A:</span> 가장 <ruby>近<rt>ちか</rt></ruby>운 <ruby>コンビニ<rt>こんびに</rt></ruby>는 어디인가요?<br>" +
           "<span class='speaker'>B:</span> 저기 <ruby>銀行<rt>ぎんこう</rt></ruby> <ruby>隣<rt>となり</rt></ruby>에 <ruby>セブンイレブン<rt>せぶんいれぶん</rt></ruby>이 있어요.<br>" +
           "<span class='speaker'>A:</span> <ruby>銀行<rt>ぎんこう</rt></ruby> 옆이군요. <ruby>分<rt>わ</rt></ruby>かりました！",
    kr: "A: 가장 가까운 편의점은 어디인가요?<br>B: 저기 은행 옆에 세븐일레븐이 있어요.<br>A: 은행 옆이군요. 알겠습니다!",
    full: [
        { s: "A", t: "一番近いコンビニはどこですか？" },
        { s: "B", t: "あそこの銀行の隣にセブンイレブンがあります。" },
        { s: "A", t: "銀行の隣ですね。分かりました！" }
    ],
    audio: "mp3/jp.mp3",
    words: "• 一番(いちばん): 가장/제일 • 隣(となり): 옆(이웃) • コンビニ: 편의점 • 分かる(わかる): 알다"
}


    ];

    let lastIndex = -1;
    let currentStep = 0;
    let isSpeaking = false;


function toggleStep() {
    const card = document.getElementById('card');

    // 현재 2단계(전체 일본어 문장)인 경우
    if (currentStep === 2) {
        // 다음 단계로 넘어가지 않고 음성만 다시 재생
        playDialogue();
        return; // 함수 종료 (단계 전환 방지)
    }

    // 0단계 또는 1단계인 경우에만 다음 단계로 진행
    currentStep = (currentStep + 1) % 3;

    card.className = 'card';
    if (currentStep > 0) card.classList.add('step-' + currentStep);

    // 2단계로 진입하는 순간 첫 재생
    if (currentStep === 2) {
        playDialogue();
    } else {
        window.speechSynthesis.cancel();
    }
}

    async function playDialogue() {
        if (isSpeaking) window.speechSynthesis.cancel();
        isSpeaking = true;

        const dialogueData = studyData[lastIndex].full;

        for (const line of dialogueData) {
            await speakLine(line.t, line.s);
        }
        isSpeaking = false;
    }

    function speakLine(text, speaker) {
        return new Promise((resolve) => {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';

            // 목소리 설정 (브라우저가 지원하는 목소리 중 선택)
            const voices = window.speechSynthesis.getVoices();
            if (speaker === "A") {
                uttr.pitch = 0.8; // 남성 느낌 (낮은 피치)
                uttr.rate = 0.9;
            } else {
                uttr.pitch = 1.2; // 여성 느낌 (높은 피치)
                uttr.rate = 1.0;
            }

            uttr.onend = resolve;
            window.speechSynthesis.speak(uttr);
        });
    }

    function nextSentence() {
        window.speechSynthesis.cancel();
        const card = document.getElementById('card');
        currentStep = 0;
        card.className = 'card';

        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * studyData.length);
        } while (newIndex === lastIndex && studyData.length > 1);
        lastIndex = newIndex;

        setTimeout(() => {
            const data = studyData[newIndex];
            document.getElementById('tag').innerText = data.tag;
            document.getElementById('jp-mixed').innerHTML = data.mixed;
            document.getElementById('kr-text').innerHTML = data.kr;

            // 전체 문장 표시 영역 생성
            let fullHtml = "";
            data.full.forEach(line => {
                fullHtml += `<span class='speaker'>${line.s}:</span> ${line.t}<br>`;
            });
            document.getElementById('jp-full').innerHTML = fullHtml;
            document.getElementById('word-text').innerText = data.words;
		// MP3 파일 연결 (데이터에 audio 경로가 있으면 연결)
const player = document.getElementById('audio-player');
if (data.audio) {
    player.src = data.audio;
    player.style.display = "block"; // 파일이 있으면 보임
} else {
    player.style.display = "none";  // 파일이 없으면 안 보임
}
        }, 150);
    }

    // 목소리 데이터를 미리 로드 (브라우저 버그 방지)
    window.speechSynthesis.onvoiceschanged = () => {};
    window.onload = nextSentence;
</script>

</body>
</html>
