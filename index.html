
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 일본어 한 문장</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #ff4757; --text: #2f3542; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: var(--text); }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .card { background: var(--card); padding: 40px 20px; border-radius: 20px; shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; cursor: pointer; border: 2px solid transparent; }
        .card:active { transform: scale(0.98); border-color: var(--primary); }
        .jp { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; word-break: keep-all; }
        .kr { font-size: 1.1rem; color: #747d8c; visibility: hidden; } /* 클릭 전에는 안보임 */
        .show .kr { visibility: visible; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-next { background: var(--primary); color: white; flex: 1; }
        .btn-audio { background: #2f3542; color: white; width: 60px; }
        .hint { margin-top: 15px; font-size: 0.8rem; color: #a4b0be; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="card" onclick="this.classList.toggle('show')">
        <div class="jp" id="jp-text">Loading...</div>
        <div class="kr" id="kr-text">해석 로딩 중...</div>
    </div>

    <div class="btn-group">
        <button class="btn-audio" onclick="playVoice()">🔊</button>
        <button class="btn-next" onclick="nextSentence()">다음 문장</button>
    </div>
    <p class="hint">카드를 터치하면 해석이 보여요!</p>
</div>

<script>
    // 공부할 문장 데이터 (여기에 계속 추가하세요!)
    const studyData = [
        { jp: "お腹がすきました。", kr: "배가 고픕니다." },
        { jp: "これ、いくらですか？", kr: "이것은 얼마입니까?" },
        { jp: "日本語を勉強しています。", kr: "일본어를 공부하고 있습니다." },
        { jp: "美味しいものを食べに行きましょう。", kr: "맛있는 것을 먹으러 갑시다." },
        { jp: "今日は天気がとてもいいですね。", kr: "오늘은 날씨가 매우 좋네요." },
        { jp: "ちょっと手伝ってもらえますか？", kr: "잠시 도와주실 수 있나요?" }
    ];

    let currentIndex = 0;

    function updateCard() {
        const card = document.getElementById('card');
        card.classList.remove('show'); // 새 문장일 땐 해석 가리기

        document.getElementById('jp-text').innerText = studyData[currentIndex].jp;
        document.getElementById('kr-text').innerText = studyData[currentIndex].kr;
    }

    function nextSentence() {
        // 랜덤으로 섞거나 순서대로 넘기기 (여기선 랜덤)
        currentIndex = Math.floor(Math.random() * studyData.length);
        updateCard();
    }

    function playVoice() {
        const text = document.getElementById('jp-text').innerText;
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP'; // 일본어 설정
        uttr.rate = 0.9;     // 속도 약간 느리게 (0.1 ~ 10)
        window.speechSynthesis.speak(uttr);
    }

    // 초기 실행
    window.onload = nextSentence;
</script>

</body>
</html>
