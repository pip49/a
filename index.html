
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 랜덤 문제 풀이</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { font-size: 1.5rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .question { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; line-height: 1.6; color: #34495e; }
        .options { margin-bottom: 20px; }
        .answer-box { display: none; background: #e8f4fd; border-left: 5px solid #3498db; padding: 15px; margin-top: 20px; border-radius: 4px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-check { background-color: #27ae60; color: white; }
        .btn-next { background-color: #3498db; color: white; }
        button:hover { opacity: 0.8; }
        .info { font-size: 0.8rem; color: #95a5a6; margin-top: 20px; text-align: right; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>⚡ 전기기능사 문제 풀이</h1>
    <div id="quiz-content">
        <div class="question" id="questionText">문제를 불러오는 중...</div>
        <div class="answer-box" id="answerBox">
            <strong>정답 및 해설:</strong> <span id="answerText"></span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-check" onclick="showAnswer()">정답 확인</button>
        <button class="btn-next" onclick="loadRandomQuiz()">다음 문제</button>
    </div>
    <p class="info">데이터 출처: questions.txt</p>
</div>

<script>
    // questions.txt의 내용을 아래 배열 형식으로 변환하여 넣으세요.
    // [문제 및 선택지, 정답] 형식입니다.
    const quizData = [
        ["1.다음 중 전하의 성질에 대한 설명으로 틀린 것은?<br>① 같은 종류의 전하는 흡인하고 다른 종류는 반발한다.<br>② 전하량은 보존된다.<br>③ 전하는 가장 뾰족한 부분에 많이 모이는 성질이 있다.<br>④ 자유전자가 과잉된 상태를 (-)대전이라 한다.", "1 (해설: 같은 종류의 전하끼리는 반발하고 다른 종류끼리 흡인합니다.)"],
        ["2.어떤 도체에 5초 동안 20[C]의 전하가 이동하였다면 이때 흐르는 전류[A]는?<br>① 2<br>② 4<br>③ 5<br>④ 100", "2 (해설: 전류 I = Q / t = 20 / 5 = 4A입니다.)"],
        ["3.1[kWh]를 열량으로 환산하면 약 몇 [kcal]인가?<br>① 640<br>② 720<br>③ 860<br>④ 1000", "3 (해설: 1kWh = 860kcal는 필수 암기 사항입니다.)"],
        ["292.전압 220[V]에서 전류 10[A]를 1시간 동안 사용했을 때의 전력량[kWh]은?<br>① 2.2<br>② 22<br>③ 220<br>④ 2200", "1 (해설: W = V * I * t = 220 * 10 * 1 = 2200Wh = 2.2kWh)"]
        // 여기에 나머지 questions.txt 내용을 복사해서 붙여넣으시면 됩니다.
    ];

    function loadRandomQuiz() {
        const randomIndex = Math.floor(Math.random() * quizData.length);
        const selectedQuiz = quizData[randomIndex];

        document.getElementById('questionText').innerHTML = selectedQuiz[0];
        document.getElementById('answerText').innerHTML = selectedQuiz[1];
        document.getElementById('answerBox').style.display = 'none';
    }

    function showAnswer() {
        document.getElementById('answerBox').style.display = 'block';
    }

    // 처음 페이지 로드 시 문제 실행
    window.onload = loadRandomQuiz;
</script>

</body>
</html>
