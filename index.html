
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 문제풀이</title>
    <style>
        /* 기존 디자인 유지 및 보강 */
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }

	/* 상단 헤더 및 입력창 스타일 */
.header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #3498db;
    margin-bottom: 15px;
    padding-bottom: 10px;
    flex-wrap: wrap;
    gap: 10px;
}

.jump-container { display: flex; align-items: center; gap: 5px; }
.jump-input {
    width: 50px;
    padding: 6px;
    border: 1px solid #bdc3c7;
    border-radius: 4px;
    text-align: center;
    font-size: 0.9rem;
}
.btn-jump {
    padding: 6px 10px;
    font-size: 0.8rem;
    background: #34495e;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
        .btn-mode { padding: 5px 10px; font-size: 0.8rem; background: #ecf0f1; color: #7f8c8d; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; }
        .btn-mode.active { background: #2ecc71; color: white; border-color: #27ae60; }

	.question { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; line-height: 1.7; color: #34495e; word-break: keep-all; }

        .question img, .answer-box img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 6px; }
        .question audio, .answer-box audio { width: 100%; margin: 10px 0; }

        .answer-box { display: none; background: #e8f4fd; border-left: 5px solid #3498db; padding: 15px; margin-top: 20px; border-radius: 4px; font-size: 1rem; line-height: 1.6; word-break: keep-all; }

        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; font-weight: bold; }
        .btn-prev { background-color: #95a5a6; color: white; }
        .btn-check { background-color: #34495e; color: white; }
        .btn-next { background-color: #3498db; color: white; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #dcdde1; cursor: not-allowed; }

        .info { font-size: 0.85rem; color: #95a5a6; margin-top: 20px; text-align: center; }
        a { color: #3498db; text-decoration: underline; }

	/* 아주 작은 푸터 스타일 */
.mini-footer {
    margin-top: 30px;
    padding-top: 15px;
    border-top: 1px solid #e0e0e0;
    text-align: center;
}

.footer-links {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.footer-links a {
    font-size: 0.75rem; /* 아주 작은 글씨 */
    color: #95a5a6; /* 연한 회색 */
    text-decoration: none;
    transition: color 0.2s;
}

.footer-links a:hover {
    color: #3498db; /* 마우스 올리면 파란색 */
    text-decoration: underline;
}

/* 구분선(|) 스타일 */
.footer-links span {
    font-size: 0.7rem;
    color: #ecf0f1;
}

	/* 격언 카드 스타일 */
.proverb-container {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: none;
    width: 100%;
    max-width: 600px;
    box-sizing: border-box;
    margin-top: 40px; /* 메인 카드와의 간격 */
    text-align: center;
}

.proverb-text {
    font-size: 0.95rem;
    color: #7f8c8d;
    font-style: italic;
    line-height: 1.6;
    word-break: keep-all;
}

/* 전체 레이아웃 정렬을 위한 body 수정 */
body {
    flex-direction: column; /* 카드를 세로로 배치 */
    align-items: center;
}

	/* AI 번역 및 읽기 도구 스타일 */
.ai-translate-box {
    margin-top: 20px;
    padding: 15px;
    background: #fdfdfd;
    border: 1px dashed #3498db;
    border-radius: 8px;
    text-align: left;
}
.ai-translate-box textarea {
    width: 100%;
    height: 60px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 0.85rem;
    box-sizing: border-box;
    resize: none;
}
.ai-btn-group {
    display: flex;
    gap: 5px;
    margin-top: 8px;
}
.ai-btn {
    flex: 1;
    padding: 8px !important;
    font-size: 0.8rem !important;
    background: #3498db;
    color: white;
    cursor: pointer;
}
.ai-btn.speak { background: #2ecc71; }
.translation-result {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #2c3e50;
    min-height: 40px;      /* 최소 높이 */
    max-height: 250px;     /* 결과가 아주 길 때만 스크롤 발생 */
    overflow-y: auto;      /* 내용이 많으면 박스 내부 스크롤 생성 */
    padding: 12px;
    border-left: 3px solid #3498db;
    background: #eff7fd;
    white-space: pre-wrap; /* 줄바꿈(엔터) 유지 */
    word-break: break-word;/* 긴 단어도 자동 줄바꿈 */
}

    </style>
</head>

		["<span style='color: #003399;'>8. '자기력선의 방향은 오른나사를 돌릴 때 나사의 진행 방향과 같다'는 법칙은?</span><br><br>① 앙페르의 오른나사 법칙<br>② 플레밍의 왼손 법칙<br>③ 패러데이의 법칙<br>④ 렌츠의 법칙", "1 (해설: 전류와 자기장의 방향 관계를 나타내는 법칙입니다.)<br><br><a href='html/8.html' target='_blank'>앙페르/패러데이</a>"],

  ["<span style='color: #003399;'>103. 합성수지관 공사에서 관 상호 간을 접속할 때 삽입 깊이는 관 바깥지름의 몇 배인가? (단, 접착제 사용 안 함)</span><br><br>① 0.8배<br>② 1.0배<br>③ 1.2배<br>④ 1.5배", "3 (해설: 접착제 미사용 시 1.2배, 사용 시 0.8배입니다.)"],
  ["<span style='color: #003399;'>104. 가요전선관 공사에서 관 상호 간을 접속할 때 사용하는 커플링은?</span><br><br>① 컴비네이션 커플링<br>② 스트레이트 커플링<br>③ 앵글 커플링<br>④ 스플릿 커플링", "4 (해설: 가요전선관 상호 접속에는 스플릿 커플링을 사용합니다.)"],
  ["<span style='color: #003399;'>105. 폭연성 분진이 있는 위험 장소에서 저압 옥내배선 공사 방법으로 가능한 것은?</span><br><br>① 합성수지관 공사<br>② 금속관 공사<br>③ 가요전선관 공사<br>④ 덕트 공사", "2 (해설: 폭발 위험 장소에서는 가장 튼튼한 금속관 공사나 케이블 공사만 가능합니다.)"],
  ["<span style='color: #003399;'>106. 화약고 등의 위험 장소에서 전기 설비를 시설할 때 전로의 대지전압은 몇 [V] 이하로 제한하는가?</span><br><br>① 150<br>② 300<br>③ 400<br>④ 600", "2 (해설: 위험 장소의 대지전압 제한은 보통 300V 이하입니다.)"],
  ["<span style='color: #003399;'>107. 가공 전선로의 지지물에 시설하는 지선으로 사용할 수 없는 지지물은?</span><br><br>① 목주<br>② 철근 콘크리트주<br>③ 철주<br>④ 철탑", "4 (해설: 철탑은 지선을 사용하여 강도를 분담해서는 안 됩니다.)"],
  ["<span style='color: #003399;'>108. 저압 연접 인입선이 도로를 횡단할 때 노면상의 높이는 최소 몇 [m] 이상인가?</span><br><br>① 2.5<br>② 3.0<br>③ 4.0<br>④ 5.0", "4 (해설: 도로 횡단 시 인입선의 높이는 5m 이상입니다.)"],
  ["<span style='color: #003399;'>109. 금속덕트 공사에서 덕트를 지지점 간의 거리는 몇 [m] 이하로 해야 하는가?</span><br><br>① 1.5<br>② 2.0<br>③ 3.0<br>④ 5.0", "3 (해설: 금속덕트의 지지점 간 거리는 3m 이하(수직으로 붙이는 경우 6m)입니다.)"],
  ["<span style='color: #003399;'>110. 캡타이어 케이블을 조영재에 시설할 때 지지점 간의 거리는 몇 [m] 이하인가?</span><br><br>① 1.0<br>② 1.5<br>③ 2.0<br>④ 2.5", "1 (해설: 캡타이어 케이블의 지지점 간 거리는 1m 이하입니다.)"],
  ["<span style='color: #003399;'>111. 사람이 쉽게 접촉할 우려가 있는 장소에 시설하는 누전차단기의 동작 시간 기준은?</span><br><br>① 0.03초 이내<br>② 0.1초 이내<br>③ 0.5초 이내<br>④ 1초 이내", "1 (해설: 감전방지용 누전차단기는 정격감도전류 30mA 이하, 동작시간 0.03초 이내여야 합니다.)"],
  ["<span style='color: #003399;'>112. 다음 중 접지공사에서 접지극으로 사용할 수 없는 것은?</span><br><br>① 동판<br>② 동봉<br>③ 철선<br>④ 알루미늄선", "4 (해설: 알루미늄은 부식 우려가 있어 접지극으로 사용하지 않습니다.)"],
  ["<span style='color: #003399;'>113. 금속관을 구부릴 때 안측의 반지름은 관 안지름의 최소 몇 배 이상이어야 하는가?</span><br><br>① 3배<br>② 6배<br>③ 8배<br>④ 10배", "2 (해설: 금속관 굴곡 반지름은 관 안지름의 6배 이상이어야 합니다.)"],
  ["<span style='color: #003399;'>114. 흥행장의 저압 옥내배선 사용전압은 몇 [V] 미만이어야 하는가?</span><br><br>① 150<br>② 300<br>③ 400<br>④ 600", "3 (해설: 무대, 오케스트라 박스 등 흥행장의 사용전압은 400V 미만입니다.)"],
  ["<span style='color: #003399;'>115. 애자사용 공사에서 전선 상호 간의 이격거리는 최소 몇 [cm] 이상인가?</span><br><br>① 4<br>② 6<br>③ 8<br>④ 10", "2 (해설: 저압 애자사용 공사 시 전선 상호 간 이격거리는 6cm 이상입니다.)"],
  ["<span style='color: #003399;'>116. 수전실, 변전실 등에 반드시 출입구에 표시해야 하는 것은?</span><br><br>① 담당자 성명<br>② 위험 표시<br>③ 사용 전압<br>④ 건립 날짜", "2 (해설: 고압 이상의 전기설비가 있는 곳에는 반드시 '위험' 표시를 해야 합니다.)"],
  ["<span style='color: #003399;'>117. 고압 가공전선로에 사용하는 목주의 풍압하중 안전율은 얼마 이상인가?</span><br><br>① 1.2<br>② 1.3<br>③ 1.5<br>④ 2.0", "3 (해설: 고압 가공전선로 목주의 안전율은 1.5 이상입니다.)"],
  ["<span style='color: #003399;'>118. 금속관 공사에서 나사내기에 사용되는 공구는?</span><br><br>① 파이프 커터<br>② 오스터<br>③ 파이프 렌치<br>④ 벤더", "2 (해설: 금속관에 나사를 낼 때는 오스터(또는 다이스)를 사용합니다.)"],
  ["<span style='color: #003399;'>119. 전선의 접속법 중 트위스트 접속은 몇 [mm²] 이하의 가는 단선에 사용하는가?</span><br><br>① 2.5<br>② 6<br>③ 10<br>④ 16", "3 (해설: 트위스트 접속은 10mm² 이하의 가는 단선에 사용합니다.)"],
  ["<span style='color: #003399;'>120. 옥내 배선 공사 시 금속관의 두께는 콘크리트에 매입할 경우 최소 몇 [mm] 이상인가?</span><br><br>① 1.0<br>② 1.2<br>③ 1.5<br>④ 2.0", "2 (해설: 콘크리트 매입 금속관은 두께 1.2mm 이상의 후강 전선관을 사용합니다.)"],
  ["<span style='color: #003399;'>121. 전등 한 개를 두 곳에서 점멸하기 위해 필요한 스위치는?</span><br><br>① 2로 스위치 2개<br>② 3로 스위치 2개<br>③ 4로 스위치 1개<br>④ 3로 스위치 1개", "2 (해설: 2개소 점멸은 3로 스위치 2개가 필요합니다.)"],
  ["<span style='color: #003399;'>122. 전선 접속 시 사용하는 슬리브 중 단선 접속에 주로 사용되는 것은?</span><br><br>① S형 슬리브<br>② E형 슬리브<br>③ 직선형 슬리브<br>④ 분기형 슬리브", "2 (해설: 박스 내 단선 접속에는 E형 슬리브(압착 슬리브)를 많이 사용합니다.)"],
  ["<span style='color: #003399;'>123. 지지점 간의 거리가 15m인 저압 가공 인입선의 최소 굵기는 몇 [mm]인가?</span><br><br>① 2.0<br>② 2.6<br>③ 3.2<br>④ 4.0", "2 (해설: 경간 15m 초과 시 2.6mm 이상의 인입용 비닐절연전선을 사용합니다.)"],
  ["<span style='color: #003399;'>124. 정격전류가 20A인 전동기 한 대가 연결된 간선의 허용전류는 최소 몇 [A]인가?</span><br><br>① 20<br>② 22<br>③ 25<br>④ 30", "3 (해설: 50A 이하일 경우 1.25배를 곱하므로 20 * 1.25 = 25A입니다.)"],
  ["<span style='color: #003399;'>125. 옥내 소형 전등 회로에 사용하는 과전류 차단기의 정격전류 최대값은?</span><br><br>① 15A<br>② 20A<br>③ 30A<br>④ 50A", "2 (해설: 배선용 차단기 기준 일반적으로 20A 분기회로를 사용합니다.)"],
  ["<span style='color: #003399;'>126. 다음 중 전선의 슬리브 접속 후 반드시 해야 하는 처리는?</span><br><br>① 납땜<br>② 절연 테이핑<br>③ 페인트 도포<br>④ 그냥 둔다", "2 (해설: 접속 부분은 전선의 절연물과 동등 이상의 절연 효력이 있도록 테이핑해야 합니다.)"],
  ["<span style='color: #003399;'>127. 가요전선관과 금속관을 연결할 때 사용하는 부속품은?</span><br><br>① 컴비네이션 커플링<br>② 스트레이트 커플링<br>③ 앵글 커플링<br>④ 박스 커넥터", "1 (해설: 서로 다른 종류의 관을 연결할 때는 컴비네이션 커플링을 사용합니다.)"],
  ["<span style='color: #003399;'>128. 가공 전선로의 지지물에서 전선로의 방향이 바뀌는 부분에 사용하는 애자는?</span><br><br>① 핀 애자<br>② 현수 애자<br>③ 인류 애자<br>④ 저압 라인 포스트 애자", "3 (해설: 전선로의 끝이나 굴곡점에서 인장력을 견디기 위해 인류 애자를 사용합니다.)"],
  ["<span style='color: #003399;'>129. 전기 울타리에 사용하는 전선의 최소 굵기는 지름 몇 [mm]인가?</span><br><br>① 1.6<br>② 2.0<br>③ 2.6<br>④ 3.2", "2 (해설: 전기 울타리용 전선은 지름 2.0mm 이상의 인장강도가 있는 것을 사용합니다.)"],
  ["<span style='color: #003399;'>130. 덕트 공사 중 환기형 전선 덕트의 지지점 간 거리는 최대 몇 [m]인가?</span><br><br>① 1.5<br>② 2.0<br>③ 3.0<br>④ 5.0", "1 (해설: 버스덕트 등 특별한 경우를 제외한 덕트 지지점은 보통 3m이나, 소형 가공 덕트는 1.5m 기준을 따르기도 합니다. 일반 금속덕트는 3m입니다.)"],
  ["<span style='color: #003399;'>131. 케이블 공사 시 전선을 조영재의 옆면에 따라 붙이는 경우 지지점 간 거리는?</span><br><br>① 1m 이하<br>② 1.5m 이하<br>③ 2m 이하<br>④ 2.5m 이하", "3 (해설: 케이블의 지지점 간 거리는 2m 이하입니다.)"],
  ["<span style='color: #003399;'>132. 지선의 중간에 넣어 지선 상부와 하부를 절연하는 애자는?</span><br><br>① 구형 애자<br>② 핀 애자<br>③ 저압 곡선 애자<br>④ 인류 애자", "1 (해설: 지선 중간에 설치하는 동그란 애자를 구형 애자(지선 애자)라고 합니다.)"],
  ["<span style='color: #003399;'>133. 사람이 쉽게 접촉하는 장소의 누전차단기 설치 목적으로 가장 적절한 것은?</span><br><br>① 전압 강하 방지<br>② 지락 사고 시 감전 보호<br>③ 역률 개선<br>④ 과부하 차단만 전담", "2 (해설: 누전차단기는 누전(지락) 발생 시 회로를 차단하여 인명을 보호합니다.)"],
  ["<span style='color: #003399;'>134. 가공 전선로의 경간이 500m를 넘는 경우 지지물로 반드시 사용해야 하는 것은?</span><br><br>① 목주<br>② 철근 콘크리트주<br>③ 철주<br>④ 철탑", "4 (해설: 장경간(긴 거리)에는 강도가 높은 철탑을 지지물로 사용합니다.)"],
  ["<span style='color: #003399;'>135. 가공 전선로의 지선 안전율은 얼마 이상인가?</span><br><br>① 1.5<br>② 2.0<br>③ 2.5<br>④ 3.0", "3 (해설: 지선의 안전율은 2.5 이상입니다.)"],
  ["<span style='color: #003399;'>136. 노출 배선 공사에서 전선을 보호하기 위해 벽에 구멍을 뚫고 끼우는 것은?</span><br><br>① 부싱<br>② 노브<br>③ 관(튜브)<br>④ 새들", "3 (해설: 전선이 벽을 통과할 때는 절연 튜브나 관을 사용하여 보호합니다.)"],
  ["<span style='color: #003399;'>137. 고압 가공전선의 최소 높이는 도로를 횡단할 때 지표상 몇 [m]인가?</span><br><br>① 5.0<br>② 5.5<br>③ 6.0<br>④ 6.5", "3 (해설: 고압 가공전선의 도로 횡단 시 높이는 6m 이상입니다.)"],
  ["<span style='color: #003399;'>138. 전선의 약호 중 'OW'가 의미하는 것은?</span><br><br>① 인입용 비닐 절연전선<br>② 옥외용 비닐 절연전선<br>③ 옥내용 비닐 절연전선<br>④ 내열 비닐 절연전선", "2 (해설: OW는 Out-door Weatherproof의 약자로 옥외용입니다.)"],
  ["<span style='color: #003399;'>139. 배전반 및 분전반의 설치 장소로 적합하지 않은 곳은?</span><br><br>① 점검이 쉬운 곳<br>② 노출된 장소<br>③ 밀폐된 좁은 방 안<br>④ 전기 회로를 조작하기 쉬운 곳", "3 (해설: 배전반은 점검 및 조작이 쉬운 개방된 장소에 설치해야 합니다.)"],
  ["<span style='color: #003399;'>140. 테이프 모양의 절연물로 전선을 감을 때 겹쳐 감는 폭은 전선 폭의 얼마가 적당한가?</span><br><br>① 1/4<br>② 1/3<br>③ 1/2<br>④ 전체 다 겹치게", "3 (해설: 절연 테이프는 반 폭(1/2) 이상이 겹치도록 감아야 합니다.)"],
  ["<span style='color: #003399;'>141. 합성수지관의 1본 표준 길이는 몇 [m]인가?</span><br><br>① 2.0<br>② 3.6<br>③ 4.0<br>④ 5.0", "3 (해설: 합성수지관(PVC관)의 표준 길이는 4m입니다.)"],
  ["<span style='color: #003399;'>142. 금속관의 1본 표준 길이는 몇 [m]인가?</span><br><br>① 3.0<br>② 3.66<br>③ 4.0<br>④ 5.0", "2 (해설: 금속 전선관의 표준 길이는 3.66m입니다.)"],
  ["<span style='color: #003399;'>143. 전선 접합 시 사용하는 와이어 커넥터의 장점은?</span><br><br>① 납땜이 필요 없다<br>② 기계적 강도가 가장 세다<br>③ 고압에도 사용 가능하다<br>④ 가격이 가장 비싸다", "1 (해설: 와이어 커넥터는 납땜과 테이핑 없이 신속하게 접속할 수 있는 부품입니다.)"],
  ["<span style='color: #003399;'>144. 가요전선관 공사에서 전선관을 박스에 고정할 때 사용하는 것은?</span><br><br>① 커플링<br>② 스트레이트 박스 커넥터<br>③ 록너트<br>④ 부싱", "2 (해설: 가요전선관과 박스를 연결할 때는 스트레이트 또는 앵글 커넥터를 사용합니다.)"],
  ["<span style='color: #003399;'>145. 고압 이상의 전기 기계 기구 주위에 울타리를 설치할 때 울타리 높이는 최소 몇 [m]인가?</span><br><br>① 1.5<br>② 2.0<br>③ 2.5<br>④ 3.0", "2 (해설: 울타리, 담 등의 높이는 2m 이상이어야 합니다.)"],
  ["<span style='color: #003399;'>146. 수동으로 전로를 개폐하며, 과부하 시 자동으로 차단되는 장치는?</span><br><br>① 나이프 스위치<br>② 배선용 차단기<br>③ 전자 접촉기<br>④ 단로기", "2 (해설: MCCB(배선용 차단기)는 개폐 및 자동 차단 기능을 모두 가집니다.)"],
  ["<span style='color: #003399;'>147. 금속관 공사 시 관을 구부리기 위해 사용하는 공구는?</span><br><br>① 파이프 바이스<br>② 파이프 벤더<br>③ 리머<br>④ 다이스", "2 (해설: 파이프 벤더(히키)를 사용하여 금속관을 구부립니다.)"],
  ["<span style='color: #003399;'>148. 다음 중 연축전지의 정격 방전율은 몇 시간인가?</span><br><br>① 3시간<br>② 5시간<br>③ 10시간<br>④ 20시간", "3 (해설: 연축전지는 10시간, 알칼리 축전지는 5시간 기준입니다.)"],
  ["<span style='color: #003399;'>149. 저압 옥내배선에서 전선의 접속은 어디서 이루어져야 하는가?</span><br><br>① 전선관 내부<br>② 벽 속<br>③ 박스 또는 커넥터 내부<br>④ 땅 속", "3 (해설: 전선의 접속점은 점검이 가능한 박스 내부 등에서 이루어져야 합니다.)"],
  ["<span style='color: #003399;'>150. 다음 중 전선로의 지지물이 아닌 것은?</span><br><br>① 철탑<br>② 철주<br>③ 애자<br>④ 목주", "3 (해설: 애자는 전선을 지지물에 절연하여 고정하는 부품이지 지지물 자체가 아닙니다.)"],
["<span style='color: #003399;'>151. 전선의 색상 규정(KEC) 중 중성선(N)에 사용하는 색상은?</span><br><br>① 갈색<br>② 흑색<br>③ 회색<br>④ 청색", "4 (해설: KEC 규정상 L1-갈색, L2-흑색, L3-회색, N-청색, 보호도체-황록색입니다.)"],
  ["<span style='color: #003399;'>152. 전압의 구분 중 직류(DC) 저압의 범위는 몇 [V] 이하인가?</span><br><br>① 600<br>② 750<br>③ 1000<br>④ 1500", "4 (해설: KEC 개정으로 직류 저압은 1500V 이하, 교류 저압은 1000V 이하입니다.)"],
  ["<span style='color: #003399;'>153. 조명 설계 시 실내 면적에 대한 광속의 비율을 나타내는 것은?</span><br><br>① 조도<br>② 광도<br>③ 휘도<br>④ 광속발산도", "1 (해설: 조도는 단위 면적당 입사하는 광속[lm/m²]을 말하며 단위는 [lx]입니다.)"],
  ["<span style='color: #003399;'>154. 전동기의 회전 방향을 바꾸는 역전 제어 시, 두 개의 전자 접촉기가 동시에 투입되지 않도록 하는 회로는?</span><br><br>① 자기유지 회로<br>② 인터록 회로<br>③ 우선순위 회로<br>④ 지연 회로", "2 (해설: 기기 보호를 위해 상대방의 동작을 구속하는 인터록(Interlock) 회로가 필수입니다.)"],
  ["<span style='color: #003399;'>155. 금속관 공사에서 관의 굴곡 개소가 몇 개소를 넘을 때 풀박스를 설치하는 것이 바람직한가?</span><br><br>① 1개소<br>② 2개소<br>③ 3개소<br>④ 5개소", "3 (해설: 굴곡이 3개소를 초과하거나 관의 길이가 30m를 넘으면 풀박스를 설치합니다.)"],
  ["<span style='color: #003399;'>156. 전선 약호 중 'CV'가 의미하는 것은?</span><br><br>① 가공용 비닐 절연전선<br>② 가교 폴리에틸렌 절연 비닐 시스 케이블<br>③ 제어용 케이블<br>④ 고무 절연 케이블", "2 (해설: CV는 전력용 케이블로 가장 많이 사용되는 종류입니다.)"],
  ["<span style='color: #003399;'>157. 전기기계기구의 외함에 실시하는 접지공사의 주된 목적은?</span><br><br>① 전압 상승 방지<br>② 감전 사고 방지<br>③ 전력 손실 방지<br>④ 기기 효율 향상", "2 (해설: 누전 시 외함에 흐르는 전류를 대지로 방전시켜 인체 감전을 예방합니다.)"],
  ["<span style='color: #003399;'>158. 가공전선로에서 전선의 자중, 풍압, 빙설 등에 견디는 기계적 강도를 계산할 때 사용하는 계수는?</span><br><br>① 이용률<br>② 부하율<br>③ 안전율<br>④ 수용률", "3 (해설: 시설물의 안전을 위해 실제 하중보다 더 견딜 수 있도록 설계하는 비율입니다.)"],
  ["<span style='color: #003399;'>159. 심벌 기호 중 'S'와 숫자 3이 같이 표시된(S3) 기호의 명칭은?</span><br><br>① 스위치<br>② 타임 스위치<br>③ 3로 스위치<br>④ 3단 스위치", "3 (해설: S 옆의 숫자는 스위치의 종류를 나타내며 3은 3로 스위치입니다.)"],
  ["<span style='color: #003399;'>160. 다음 중 자기유도 작용을 응용한 기기는?</span><br><br>① 변압기<br>② 유도전동기<br>③ 리액터<br>④ 발전기", "3 (해설: 하나의 코일에서 발생하는 자기유도 현상을 이용한 것은 리액터입니다.)"],
  ["<span style='color: #003399;'>161. 콘덴서(C)만의 회로에서 전압과 전류의 위상 관계는?</span><br><br>① 전류가 전압보다 90도 앞선다<br>② 전압이 전류보다 90도 앞선다<br>③ 위상이 같다<br>④ 위상이 반대이다", "1 (해설: 콘덴서 회로의 전류는 전압보다 90도 빠른 '진상 전류'입니다.)"],
  ["<span style='color: #003399;'>162. 반도체 소자 중 교류(AC) 양방향으로 전류를 흘릴 수 있는 것은?</span><br><br>① SCR<br>② TRIAC<br>③ Diode<br>④ FET", "2 (해설: TRIAC은 SCR 두 개를 역병렬로 연결한 구조로 교류 제어에 쓰입니다.)"],
	["<span style='color: #003399;'>163. 직류 발전기의 전기자 권선법 중 저전압 대전류에 적합한 방식은?</span><br><br>① 중권<br>② 파권<br>③ 단절권<br>④ 전절권", "1 (해설: 중권은 병렬 회로수가 많아 대전류에 유리하고, 파권은 고전압에 유리합니다.)<br><br><a href='html/163.html' target='_blank'>직류발전기</a>"],
  ["<span style='color: #003399;'>164. 변압기의 무부하시험을 통해 알 수 있는 손실은?</span><br><br>① 동손<br>② 철손<br>③ 저항손<br>④ 표류부하손", "2 (해설: 부하가 없을 때 발생하는 손실은 고정손인 철손입니다.)"],


 ["<span style='color: #003399;'>165. 유도전동기의 동기속도가 1800[rpm], 회전속도가 1728[rpm]일 때 슬립(s)은 몇 [%]인가?</span><br><br>① 2<br>② 4<br>③ 6<br>④ 8", "2 (해설: s = (1800 - 1728) / 1800 = 0.04 이므로 4%입니다.)<br><br><a href='html/165.html' target='_blank'>유도전동기 슬립</a>"], 


  ["<span style='color: #003399;'>166. 분진폭발 위험장소에서 사용할 수 있는 방폭구조 중 내부 폭발 시 외부로 화염이 새지 않게 설계된 것은?</span><br><br>① 압력 방폭구조<br>② 내압 방폭구조<br>③ 유입 방폭구조<br>④ 안전증 방폭구조", "2 (해설: 내압(耐壓) 방폭구조(d)에 대한 설명입니다.)"],
  ["<span style='color: #003399;'>167. 가요전선관 공사에서 가요전선관과 박스를 연결할 때 사용하는 부속품은?</span><br><br>① 앵글 커플링<br>② 스트레이트 박스 커넥터<br>③ 스플릿 커플링<br>④ 링 리듀서", "2 (해설: 박스와 연결할 때는 커넥터를, 관끼리 연결할 때는 커플링을 씁니다.)"],
  ["<span style='color: #003399;'>168. 가공전선로의 지지물 중 철근 콘크리트주의 표준 길이는 최소 몇 [m] 이상인가?</span><br><br>① 6<br>② 7<br>③ 10<br>④ 12", "1 (해설: 보통 CP주라고 불리는 전주의 길이는 6m부터 시작합니다.)"],
  ["<span style='color: #003399;'>169. 애자사용 공사에서 400V 초과 저압 전선과 조영재 사이의 이격 거리는 최소 몇 [cm]인가?</span><br><br>① 2.5<br>② 4.5<br>③ 6.0<br>④ 10", "2 (해설: 400V 미만은 2.5cm, 400V 초과는 4.5cm(건조 시 2.5cm)입니다.)<br><br><a href='html/169.html' target='_blank'>애자공사 이격거리</a>"],
  ["<span style='color: #003399;'>170. 조명 기구 중 빛의 90~100[%]를 아래쪽으로 직접 비추는 방식은?</span><br><br>① 직접 조명<br>② 간접 조명<br>③ 반직접 조명<br>④ 전반 확산 조명", "1 (해설: 조명 효율은 좋으나 눈부심이 발생할 수 있는 직접 조명입니다.)"],
  ["<span style='color: #003399;'>171. 물질 중 자석에 잘 붙는 성질을 가진 강자성체가 아닌 것은?</span><br><br>① 철<br>② 니켈<br>③ 코발트<br>④ 구리", "4 (해설: 구리는 반자성체 또는 상자성체로 자석에 붙지 않습니다.)"],
  ["<span style='color: #003399;'>172. 100[V], 500[W] 전열기의 니크롬선을 2배로 길게 하면 전력은 몇 [W]가 되는가?</span><br><br>① 250<br>② 500<br>③ 1000<br>④ 2000", "1 (해설: 길이가 2배면 저항이 2배가 되고, P=V²/R 이므로 전력은 절반인 250W가 됩니다.)"],
	["<span style='color: #003399;'>173. 교류 회로에서 유효전력(P)을 구하는 공식은?</span><br><br>① VI<br>② VI sinθ<br>③ VI cosθ<br>④ I²X", "3 (해설: 역률(cosθ)을 곱한 것이 실제 소비되는 유효전력입니다.)<br><br><a href='html/173.html' target='_blank'>전력의 종류"],
  ["<span style='color: #003399;'>174. 3상 유도전동기의 슬립이 0인 경우는?</span><br><br>① 정지 시<br>② 동기속도로 회전 시<br>③ 기동 시<br>④ 역전 시", "2 (해설: 회전자 속도가 동기속도와 같아지면 슬립은 0이 됩니다.)"],
  ["<span style='color: #003399;'>175. 변압기의 권선 비(a)가 10일 때, 2차측 저항을 1차측으로 환산하면 몇 배가 되는가?</span><br><br>① 10배<br>② 20배<br>③ 100배<br>④ 1/10배", "3 (해설: 임피던스 환산 시 권선비의 제곱(a²)배가 됩니다.)"],
  ["<span style='color: #003399;'>176. 정격전류가 60A인 전동기 여러 대가 연결된 간선의 허용전류는 최소 몇 [A]인가?</span><br><br>① 60<br>② 66<br>③ 75<br>④ 90", "2 (해설: 50A 초과이므로 60 * 1.1 = 66A입니다.)"],
  ["<span style='color: #003399;'>177. 지선의 안전율은 보통 얼마 이상이어야 하는가?</span><br><br>① 1.5<br>② 2.0<br>③ 2.5<br>④ 4.0", "3 (해설: 지선의 안전율은 2.5, 인장하중은 4.31kN 이상입니다.)"],
  ["<span style='color: #003399;'>178. 금속제 가요전선관 공사에서 관의 최소 굴곡 반지름은 안지름의 몇 배 이상인가?</span><br><br>① 3배<br>② 6배<br>③ 10배<br>④ 12배", "2 (해설: 금속관과 마찬가지로 가요전선관도 기본 6배 기준입니다.)"],
  ["<span style='color: #003399;'>179. 점유 면적이 좁고 보수 점검이 쉬워 대형 빌딩이나 공장에 쓰이는 수전 설비는?</span><br><br>① 옥외형<br>② 큐비클형<br>③ 기둥형<br>④ 개방형", "2 (해설: 금속 외함 내에 모든 기기를 넣은 폐쇄형 배전반(큐비클)입니다.)"],
  ["<span style='color: #003399;'>180. 전선 접속 방법 중 '권선 접속'은 주로 어떤 전선에 사용하는가?</span><br><br>① 가는 단선<br>② 굵은 단선<br>③ 연선<br>④ 알루미늄선", "2 (해설: 10mm² 이상의 굵은 단선 접속에 주로 쓰입니다.)"],
  ["<span style='color: #003399;'>181. 회로 시험기(테스터)로 측정할 수 없는 것은?</span><br><br>① 직류 전압<br>② 교류 전압<br>③ 저항<br>④ 절연 저항", "4 (해설: 일반 테스터는 낮은 전압을 쓰므로 고전압이 필요한 절연 저항 측정은 '메거'를 써야 합니다.)"],
  ["<span style='color: #003399;'>182. 전동기의 과부하 보호를 위해 사용하는 계전기가 아닌 것은?</span><br><br>① 열동 계전기(THR)<br>② 전자식 과전류 계전기(EOCR)<br>③ 부족 전압 계전기(UVR)<br>④ 배선용 차단기", "3 (해설: 부족 전압 계전기는 전압이 떨어졌을 때 동작하는 장치입니다.)"],
  ["<span style='color: #003399;'>183. 합성수지관 공사에서 지지점 간의 거리는 최대 몇 [m] 이하인가?</span><br><br>① 1.0<br>② 1.5<br>③ 2.0<br>④ 3.0", "2 (해설: 합성수지관은 1.5m, 금속관은 2.0m 이하입니다.)"],
  ["<span style='color: #003399;'>184. 화약류 저장소의 조명 전압은 최대 몇 [V] 이하인가?</span><br><br>① 150<br>② 300<br>③ 400<br>④ 600", "2 (해설: 위험 장소의 대지 전압 및 사용 전압 제한은 보통 300V입니다.)"],

    let history = [];
    let currentHistoryIndex = -1;
    let isRandomMode = true;
    let sequentialIndex = 0;
    const proverbData = [
        "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        "인생에서 가장 큰 영광은 넘어지지 않는 것이 아니라 넘어질 때마다 일어서는 데 있다.",
        "The only way to do great work is to love what you do. - Steve Jobs",
        "천재는 1%의 영감과 99%의 노력으로 이루어진다.",
        "Believe you can and you're halfway there.",
        "어제보다 나은 오늘을 만드는 것은 당신의 의지입니다.",
        "Don't watch the clock; do what it does. Keep going.",
        "작은 기회로부터 종종 위대한 업적이 시작된다."
    ];

    function displayProverb() {
        const proverbElement = document.getElementById('proverbText');
        if (proverbElement) {
            const randomIndex = Math.floor(Math.random() * proverbData.length);
            proverbElement.innerText = proverbData[randomIndex];
        }
    }

    function toggleMode() {
        isRandomMode = !isRandomMode;
        const modeBtn = document.getElementById('modeBtn');

        if (isRandomMode) {
            modeBtn.innerText = "랜덤 모드";
            modeBtn.classList.remove('active');
            history = [];
            currentHistoryIndex = -1;
        } else {
            modeBtn.innerText = "순차 모드";
            modeBtn.classList.add('active');
            sequentialIndex = 0;
        }
        nextQuiz();
    }

// 특정 번호로 바로 가기 함수
function goToQuiz() {
    const input = document.getElementById('jumpNum');
    const num = parseInt(input.value);

    // 유효성 검사 (입력값이 없거나 범위를 벗어난 경우)
    if (isNaN(num) || num < 1 || num > quizData.length) {
        alert(`1부터 ${quizData.length} 사이의 숫자를 입력해주세요.`);
        return;
    }

    // 번호 이동 시 자동으로 '순차 모드'로 전환하여 학습 흐름 유지
    if (isRandomMode) {
        isRandomMode = false;
        const modeBtn = document.getElementById('modeBtn');
        modeBtn.innerText = "순차 모드";
        modeBtn.classList.add('active');
    }

    sequentialIndex = num - 1; // 배열 인덱스는 0부터 시작하므로 1을 뺌
    displayQuiz(sequentialIndex);
    sequentialIndex++; // 다음 문제 클릭 시 다음 번호가 나오도록 세팅
    updatePrevButton();

    input.value = ''; // 이동 후 입력창 비우기
    input.blur();    // 키보드 닫기 (모바일 대응)
}

    function nextQuiz() {
        if (!quizData || quizData.length === 0) return;

        if (isRandomMode) {
            if (currentHistoryIndex >= history.length - 1) {
                const randomIndex = Math.floor(Math.random() * quizData.length);
                history.push(randomIndex);
                currentHistoryIndex++;
            } else {
                currentHistoryIndex++;
            }
            displayQuiz(history[currentHistoryIndex]);
        } else {
            if (sequentialIndex < quizData.length) {
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            } else {
                alert("마지막 문제입니다. 처음으로 돌아갑니다.");
                sequentialIndex = 0;
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            }
        }
        updatePrevButton();
    }

    function prevQuiz() {
        if (isRandomMode) {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                displayQuiz(history[currentHistoryIndex]);
            }
        } else {
            if (sequentialIndex > 1) {
                sequentialIndex -= 2;
                if (sequentialIndex < 0) sequentialIndex = 0;
                nextQuiz();
            }
        }
        updatePrevButton();
    }

    function displayQuiz(index) {
        const selected = quizData[index];
        document.getElementById('questionText').innerHTML = selected[0];
        document.getElementById('answerText').innerHTML = selected[1];
        document.getElementById('answerBox').style.display = 'none';

        const modeLabel = isRandomMode ? "랜덤" : "순차";
        document.getElementById('quiz-count').innerText = `[${modeLabel} 모드] 문항 번호: ${index + 1} / 전체 ${quizData.length}`;
          displayProverb();
        window.scrollTo(0, 0);
    }

    function updatePrevButton() {
        const prevBtn = document.getElementById('prevBtn');
        const canGoBack = isRandomMode ? (currentHistoryIndex > 0) : (sequentialIndex > 1);
        prevBtn.style.display = canGoBack ? 'block' : 'none';
    }

function showAnswer() {
    const answerBox = document.getElementById('answerBox');

    // 현재 정답창이 보이고 있다면 숨기고, 숨겨져 있다면 보여줍니다.
    if (answerBox.style.display === 'block') {
        answerBox.style.display = 'none';
    } else {
        answerBox.style.display = 'block';
    }
}

window.onload = nextQuiz;

async function runTranslate() {
    const text = document.getElementById('aiInput').value;
    const resultDiv = document.getElementById('aiResult');

    if (!text) { alert("내용을 입력해주세요."); return; }

    const isKorean = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(text);
    const targetLang = isKorean ? 'en' : 'ko';

    resultDiv.style.display = 'block';
    resultDiv.innerText = "번역 중...";

    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURI(text)}`);
        const data = await res.json();

        // 중요: 장문의 경우 data[0]의 각 배열 조각을 모두 합쳐야 전체 문장이 나옵니다.
        const translatedFullText = data[0].map(item => item[0]).join("");

        resultDiv.innerText = translatedFullText;
    } catch (e) {
        resultDiv.innerText = "번역 실패. 인터넷 연결을 확인하세요.";
    }
}

function runSpeak() {
    // 1. 번역 결과창(aiResult)에 텍스트가 있으면 그걸 가져오고, 없으면 입력창(aiInput) 텍스트를 가져옵니다.
    const resultText = document.getElementById('aiResult').innerText;
    const inputText = document.getElementById('aiInput').value;
    
    // 번역 결과가 "번역 중..."이 아닐 때만 결과창 텍스트를 우선 사용합니다.
    const textToSpeak = (resultText && resultText !== "번역 중...") ? resultText : inputText;

    if (!textToSpeak) return;

    window.speechSynthesis.cancel(); // 기존 소리 멈춤
    const speech = new SpeechSynthesisUtterance(textToSpeak);

    // 읽어줄 텍스트의 언어 감지 (한글 포함 여부)
    const isKorean = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(textToSpeak);
    speech.lang = isKorean ? 'ko-KR' : 'en-US';
    speech.rate = 1.0;

    window.speechSynthesis.speak(speech);
}

// 1. 격언 복사 기능
function copyProverb() {
    const proverb = document.getElementById('proverbText').innerText;
    const inputField = document.getElementById('aiInput');
    inputField.value = proverb;
    inputField.focus(); // 입력창으로 포커스 이동
}

// 2. 입력창 및 결과창 초기화 기능
function clearInput() {
    document.getElementById('aiInput').value = ""; // 입력창 비우기
    const resultDiv = document.getElementById('aiResult');
    resultDiv.innerText = ""; // 결과창 내용 지우기
    resultDiv.style.display = 'none'; // 결과창 숨기기
    window.speechSynthesis.cancel(); // 읽어주던 목소리도 중단
}
