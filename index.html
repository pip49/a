
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3단계 2인 대화 학습</title>
    <style>
        :root {
    --bg: #1a1a1a;
    --card: #2d2d2d;
    --primary: #4ecdc4;   /* 태그용 민트색 유지 */
    --btn-bg: #2B1B17;    /* 아주 어두운 밤색 (커피 블랙 느낌) */
    --accent: #ffbc64;
    --text-jp: #ffffff;
    --text-kr: #a0a0a0;
    --text-full: #7bed9f;
}  
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container { width: 90%; max-width: 450px; text-align: center; padding: 20px 0; }

        .card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            min-height: 380px;
            display: flex; flex-direction: column; justify-content: flex-start;
            cursor: pointer; border: 1px solid #3d3d3d;
            text-align: left;
        }


/* 상단 태그 스타일 수정 */
.situation-tag {
    display: inline-block;
    background: #4ecdc4; /* 변수(var) 대신 예전 민트색 코드를 직접 입력 */
    color: #1a1a1a;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: bold;
    margin-bottom: 20px;
    width: fit-content;
}


        ruby { ruby-align: center; }
        rt { font-size: 0.8rem; color: var(--primary); }

        .dialogue { font-size: 1.15rem; line-height: 1.8; color: var(--text-jp); margin-bottom: 20px; }
        .speaker { color: var(--accent); font-weight: bold; margin-right: 8px; }

        .content-box { display: none; border-top: 1px solid #444; padding-top: 15px; margin-top: 5px; }
        .kr-box { color: var(--text-kr); font-size: 0.95rem; line-height: 1.6; }
        .full-box { color: var(--text-full); font-size: 1.1rem; line-height: 1.8; position: relative; }

/* 기존 내용을 지우고 아래로 교체 */
.card.step-1 .full-box { display: block; } /* 1단계: 일본어 전문 노출 */

.card.step-2 .full-box { display: block; } /* 2단계: 일본어 전문 유지 */
.card.step-2 .kr-box { display: block; }   /* 2단계: 한글 해석 추가 노출 */


        .word-box {
            font-size: 0.85rem; color: var(--accent);
            margin-top: auto; padding-top: 15px;
            background: rgba(255, 188, 100, 0.05); padding: 10px; border-radius: 10px;
        }

.btn-next {
    width: 100%; 
    padding: 18px; 
    border: none; 
    border-radius: 15px;
    background: var(--btn-bg); /* 어두운 밤색 적용 */
    color: #ffffff; 
    font-size: 1.2rem; 
    font-weight: bold;
    cursor: pointer; 
    transition: 0.2s;
    border: 1px solid #3d3d3d; /* 살짝 테두리를 주면 검정 배경과 분리되어 더 예쁩니다 */
}

/* 버튼을 눌렀을 때 효과 */
.btn-next:active { 
    transform: scale(0.98); 
    background: #1A1210; /* 누를 때는 거의 검정에 가깝게 */
}


        .hint { color: #666; font-size: 0.85rem; margin-top: 15px; }

        /* 재생 중 표시 */
        .playing { outline: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="card" onclick="toggleStep()">
        <div id="tag" class="situation-tag">상황 로딩 중</div>
        <div class="dialogue" id="jp-mixed"></div>
        <div class="content-box kr-box" id="kr-text"></div>
        <div class="content-box full-box" id="jp-full"></div>
        <div class="word-box" id="word-text"></div>
	<audio id="audio-player" controls style="width: 100%; margin-top: 15px; background: #f1f3f4; border-radius: 8px;"></audio>
    </div>
    <button class="btn-next" onclick="nextSentence()">다른 상황 보기</button>
    <p class="hint">클릭: 일본어 전문 & 음성 → 한글 해석 → 음성 반복</p>
</div>

<script>
    const studyData = [
        {
            tag: "길 찾기 - 지하철역",

                   "<span class='speaker'>B:</span> 저기 <ruby>信号<rt>しんごう</rt></ruby>를 <ruby>右<rt>みぎ</rt></ruby>로 꺾으면 바로 있어요.<br>" +
                   "<span class='speaker'>A:</span> 아, 저기 말씀이시죠? <ruby>助<rt>たす</rt></ruby>かりました！",

            full: [
                { s: "A", t: "すみません、駅はどこですか？" },

            audio: "mp3/jp2.mp3",

        },



	    {
    tag: "길 찾기 - 백화점 위치",
    mixed: "<span class='speaker'>A:</span> すみません、이 <ruby>近<rt>ちか</rt></ruby>くに <ruby>百貨店<rt>ひゃっかてん</rt></ruby> 있습니까?<br>" +
           "<span class='speaker'>B:</span> 네, <ruby>交差点<rt>こうさてん</rt></ruby>을 건너면 바로 <ruby>左<rt>ひだり</rt></ruby>에 보여요.<br>" +
           "<span class='speaker'>A:</span> <ruby>交差点<rt>こうさてん</rt></ruby> 건너서 왼쪽이군요. 감사합니다!",
    kr: "A: 죄송합니다, 이 근처에 백화점이 있나요?<br>B: 네, 교차로를 건너면 바로 왼쪽에 보여요.<br>A: 교차로 건너서 왼쪽이군요. 감사합니다!",
    full: [
        { s: "A", t: "すみません、この近くに百貨店은ありますか？" },
        { s: "B", t: "はい、交差点を渡るとすぐ左に見えますよ。" },
        { s: "A", t: "交差点を渡って左ですね。ありがとうございます！" }
    ],
    audio: "mp3/jp3.mp3",

},
{
    tag: "길 찾기 - 편의점 찾기",
    mixed: "<span class='speaker'>A:</span> 가장 <ruby>近<rt>ちか</rt></ruby>운 <ruby>コンビニ<rt>こんびに</rt></ruby>는 어디인가요?<br>" +
           "<span class='speaker'>B:</span> 저기 <ruby>銀行<rt>ぎんこう</rt></ruby> <ruby>隣<rt>となり</rt></ruby>에 <ruby>セブンイレブン<rt>せぶんいれぶん</rt></ruby>이 있어요.<br>" +
           "<span class='speaker'>A:</span> <ruby>銀行<rt>ぎんこう</rt></ruby> 옆이군요. <ruby>分<rt>わ</rt></ruby>かりました！",
    kr: "A: 가장 가까운 편의점은 어디인가요?<br>B: 저기 은행 옆에 세븐일레븐이 있어요.<br>A: 은행 옆이군요. 알겠습니다!",
    full: [
        { s: "A", t: "一番近いコンビニはどこですか？" },
        { s: "B", t: "あそこの銀行の隣にセブンイレブンがあります。" },
        { s: "A", t: "銀行の隣ですね。分かりました！" }
    ],
    audio: "mp3/jp.mp3",

},



{
    tag: "소개팅 - 첫인사",
    mixed: "<span class='speaker'>A:</span> <ruby>初<rt>はじ</rt></ruby>めまして！ <ruby>実物<rt>じつぶつ</rt></ruby>이 훨씬 미인이시네요.<br>" +
           "<span class='speaker'>B:</span> 아뇨, <ruby>過分<rt>かぶん</rt></ruby>한 말씀이세요. <ruby>遠<rt>とお</rt></ruby>이까지 오시느라 고생하셨죠?<br>" +
           "<span class='speaker'>A:</span> 아뇨, <ruby>楽<rt>たの</rt></ruby>しみ라서 전혀 힘들지 않았습니다.",
    kr: "A: 처음 뵙겠습니다! 실물이 훨씬 미인이시네요.<br>B: 아뇨, 과분한 말씀이세요. 멀리까지 오시느라 고생하셨죠?<br>A: 아뇨, 기대하고 있어서 전혀 힘들지 않았습니다.",
    full: [
        { s: "A", t: "初めまして！実物のほうがずっと美人ですね。" },
        { s: "B", t: "いえ、過分なお言葉입니다。遠くまで来るのにお疲れ様でしたか？" },
        { s: "A", t: "いいえ、楽しみだったので全然大変じゃなかったです。" }
    ],
    audio: "mp3/intro_meet.mp3",
    words: "• 実物(じつぶつ): 실물 • 過분(かぶん): 과분함 • 楽しみ(たのしみ): 즐거움/기대"
},
{
    tag: "소개팅 - 취미 묻기",
    mixed: "<span class='speaker'>A:</span> <ruby>休<rt>やす</rt></ruby>みの日에는 주로 무엇을 하시나요?<br>" +
           "<span class='speaker'>B:</span> 저는 <ruby>映画<rt>えいが</rt></ruby>를 보거나 <ruby>料理<rt>りょうり</rt></ruby>를 하는 걸 좋아해요.<br>" +
           "<span class='speaker'>A:</span> 오! 저도 <ruby>料理<rt>りょうり</rt></ruby>가 <ruby>趣味<rt>しゅみ</rt></ruby>인데. 다음에 같이 해볼까요?",
    kr: "A: 쉬는 날에는 주로 무엇을 하시나요?<br>B: 저는 영화를 보거나 요리하는 것을 좋아해요.<br>A: 오! 저도 요리가 취미인데. 다음에 같이 해볼까요?",
    full: [
        { s: "A", t: "休みの日には主に何をしますか？" },
        { s: "B", t: "私は映画を見たり、料理をしたりするのが好きです。" },
        { s: "A", t: "お！私も料理が趣味なんですよ。今度一緒にしましょうか？" }
    ],
    audio: "mp3/intro_hobby.mp3",
    words: "• 休み(やすみ): 휴일 • 映画(えいが): 영화 • 趣味(しゅみ): 취미 • 今度(こんど): 다음/이번"
},
{
    tag: "소개팅 - 음식 취향",
    mixed: "<span class='speaker'>A:</span> <ruby>辛<rt>から</rt></ruby>い <ruby>食<rt>た</rt></ruby>べ<ruby>物<rt>もの</rt></ruby>는 잘 드시는 편인가요?<br>" +
           "<span class='speaker'>B:</span> 네, 아주 좋아해요! 특히 <ruby>韓国<rt>かんこく</rt></ruby> <ruby>料理<rt>りょうり</rt></ruby>를 좋아합니다.<br>" +
           "<span class='speaker'>A:</span> <ruby>気<rt>き</rt></ruby>가 <ruby>合<rt>あ</rt></ruby>네요! 근처에 맛있는 <ruby>店<rt>みせ</rt></ruby>를 알고 있어요.",
    kr: "A: 매운 음식은 잘 드시는 편인가요?<br>B: 네, 아주 좋아해요! 특히 한국 요리를 좋아합니다.<br>A: 마음이 잘 맞네요! 근처에 맛있는 가게를 알고 있어요.",
    full: [
        { s: "A", t: "辛い食べ物はよく食べるほうですか？" },
        { s: "B", t: "はい、大好きです！特に韓国料理が好きです。" },
        { s: "A", t: "気が合いますね！近くに美味しい店を知っていますよ。" }
    ],
    audio: "mp3/intro_food.mp3",
    words: "• 辛い(からい): 맵다 • 気が合う(きがあう): 마음이 맞다 • 店(みせ): 가게"
},

    ];

    let lastIndex = -1;
    let currentStep = 0;
    let isSpeaking = false;

function toggleStep() {
    const card = document.getElementById('card');

    // 현재 2단계(마지막 단계)인 경우 다음으로 넘어가지 않고 음성만 재생
    if (currentStep === 2) {
        playDialogue();
        return; 
    }

    currentStep = (currentStep + 1) % 3;

    card.className = 'card';
    if (currentStep > 0) card.classList.add('step-' + currentStep);

    // [변경] 1단계(일본어 전문 노출)가 되는 순간 음성 재생
    if (currentStep === 1) {
        playDialogue();
    } else if (currentStep === 0) {
        window.speechSynthesis.cancel();
    }
}


    async function playDialogue() {
        if (isSpeaking) window.speechSynthesis.cancel();
        isSpeaking = true;

        const dialogueData = studyData[lastIndex].full;

        for (const line of dialogueData) {
            await speakLine(line.t, line.s);
        }
        isSpeaking = false;
    }

    function speakLine(text, speaker) {
        return new Promise((resolve) => {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';

            // 목소리 설정 (브라우저가 지원하는 목소리 중 선택)
            const voices = window.speechSynthesis.getVoices();
            if (speaker === "A") {
                uttr.pitch = 0.8; // 남성 느낌 (낮은 피치)
                uttr.rate = 0.9;
            } else {
                uttr.pitch = 1.2; // 여성 느낌 (높은 피치)
                uttr.rate = 1.0;
            }

            uttr.onend = resolve;
            window.speechSynthesis.speak(uttr);
        });
    }

    function nextSentence() {
        window.speechSynthesis.cancel();
        const card = document.getElementById('card');
        currentStep = 0;
        card.className = 'card';

        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * studyData.length);
        } while (newIndex === lastIndex && studyData.length > 1);
        lastIndex = newIndex;

        setTimeout(() => {
            const data = studyData[newIndex];
            document.getElementById('tag').innerText = data.tag;
            document.getElementById('jp-mixed').innerHTML = data.mixed;
            document.getElementById('kr-text').innerHTML = data.kr;

            // 전체 문장 표시 영역 생성
            let fullHtml = "";
            data.full.forEach(line => {
                fullHtml += `<span class='speaker'>${line.s}:</span> ${line.t}<br>`;
            });
            document.getElementById('jp-full').innerHTML = fullHtml;
            document.getElementById('word-text').innerText = data.words;
		// MP3 파일 연결 (데이터에 audio 경로가 있으면 연결)
const player = document.getElementById('audio-player');
if (data.audio) {
    player.src = data.audio;
    player.style.display = "block"; // 파일이 있으면 보임
} else {
    player.style.display = "none";  // 파일이 없으면 안 보임
}
        }, 150);
    }

    // 목소리 데이터를 미리 로드 (브라우저 버그 방지)
    window.speechSynthesis.onvoiceschanged = () => {};
    window.onload = nextSentence;
</script>

</body>
</html>
