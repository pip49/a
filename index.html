
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3단계 일본어 학습</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --primary: #4ecdc4;
            --accent: #ffbc64;
            --text-jp: #ffffff;
            --text-kr: #a0a0a0;
            --text-full: #7bed9f; /* 전체 문장용 색상 */
        }
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container { width: 90%; max-width: 450px; text-align: center; padding: 20px 0; }

        .card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            min-height: 380px;
            display: flex; flex-direction: column; justify-content: flex-start;
            cursor: pointer; border: 1px solid #3d3d3d;
            text-align: left;
        }

        .situation-tag {
            display: inline-block;
            background: var(--primary);
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        ruby { ruby-align: center; }
        rt { font-size: 0.8rem; color: var(--primary); }

        .dialogue { font-size: 1.15rem; line-height: 1.8; color: var(--text-jp); margin-bottom: 20px; }
        .speaker { color: var(--accent); font-weight: bold; margin-right: 8px; }

        /* 단계별 가리기 설정 */
        .content-box { display: none; border-top: 1px solid #444; padding-top: 15px; margin-top: 5px; }
        .kr-box { color: var(--text-kr); font-size: 0.95rem; line-height: 1.6; }
        .full-box { color: var(--text-full); font-size: 1.1rem; line-height: 1.8; }

        /* 상태에 따른 노출 제어 */
        .card.step-1 .kr-box { display: block; }
        .card.step-2 .kr-box { display: block; }
        .card.step-2 .full-box { display: block; }

        .word-box {
            font-size: 0.85rem; color: var(--accent);
            margin-top: auto; padding-top: 15px;
            background: rgba(255, 188, 100, 0.05); padding: 10px; border-radius: 10px;
        }

        .btn-next {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--primary); color: #1a1a1a; font-size: 1.2rem; font-weight: bold;
            cursor: pointer;
        }
        .hint { color: #666; font-size: 0.85rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="card" onclick="toggleStep()">
        <div id="tag" class="situation-tag">상황 로딩 중</div>

        <div class="dialogue" id="jp-mixed"></div>

        <div class="content-box kr-box" id="kr-text"></div>

        <div class="content-box full-box" id="jp-full"></div>

        <div class="word-box" id="word-text"></div>
    </div>
    <button class="btn-next" onclick="nextSentence()">다른 상황 보기</button>
    <p class="hint">클릭: 해석 보기 → 전체 문장 보기 → 초기화</p>
</div>

<script>
    const studyData = [
        {
            tag: "길 찾기 - 지하철역",
            mixed: "<span class='speaker'>A:</span> すみません、<ruby>駅<rt>えき</rt></ruby>은 어디인가요?<br>" +
                   "<span class='speaker'>B:</span> 저기 <ruby>信号<rt>しんごう</rt></ruby>를 <ruby>右<rt>みぎ</rt></ruby>로 꺾으면 바로 있어요.<br>" +
                   "<span class='speaker'>A:</span> 아, 저기 말씀이시죠? <ruby>助<rt>たす</rt></ruby>かりました！",
            kr: "A: 죄송합니다, 역은 어디인가요?<br>B: 저기 신호를 오른쪽으로 꺾으면 바로 있어요.<br>A: 아, 저기 말씀이시죠? 도움이 되었습니다!",
            full: "<span class='speaker'>A:</span> すみません、<ruby>駅<rt>えき</rt></ruby>は 어디ですか？<br>" +
                  "<span class='speaker'>B:</span> あそこの<ruby>信号<rt>しんごう</rt></ruby>を<ruby>右<rt>みぎ</rt></ruby>に<ruby>曲<rt>ま</rt></ruby>がるとすぐありますよ。<br>" +
                  "<span class='speaker'>A:</span> あ、あそこのことですね？<ruby>助<rt>たす</rt></ruby>かりました！",
            words: "• 信号(しんごう): 신호 • 右(みぎ): 오른쪽 • 曲がる(まがる): 꺾다/돌다 • 助かる(たすかる): 살아나다/도움되다"
        },
        {
            tag: "길 찾기 - 화장실",
            mixed: "<span class='speaker'>A:</span> 이 <ruby>近<rt>ちか</rt></ruby>くに <ruby>お手洗<rt>おてあら</rt></ruby>이 있습니까?<br>" +
                   "<span class='speaker'>B:</span> 네, 저기 <ruby>角<rt>かど</rt></ruby>에 있는 편의점 안에 있어요.<br>" +
                   "<span class='speaker'>A:</span> <ruby>助<rt>たす</rt></ruby>かりました。ありがとうございます！",
            kr: "A: 이 근처에 화장실이 있나요?<br>B: 네, 저기 모퉁이에 있는 편의점 안에 있어요.<br>A: 살았네요. 감사합니다!",
            full: "<span class='speaker'>A:</span> この<ruby>近<rt>ちか</rt></ruby>くに お<ruby>手洗<rt>てあら</rt></ruby>いはありますか？<br>" +
                  "<span class='speaker'>B:</span> はい、あそこの<ruby>角<rt>かど</rt></ruby>にあるコンビニの<ruby>中<rt>なか</rt></ruby>にあります。<br>" +
                  "<span class='speaker'>A:</span> <ruby>助<rt>たす</rt></ruby>かりました。ありがとうございます！",
            words: "• 近く(ちかく): 근처 • 角(かど): 모퉁이 • 中(なか): 안"
        }
    ];

    let lastIndex = -1;
    let currentStep = 0; // 0: 기본, 1: 해석, 2: 전체문장

    function toggleStep() {
        const card = document.getElementById('card');
        currentStep = (currentStep + 1) % 3; // 0, 1, 2 순환

        card.className = 'card'; // 초기화
        if (currentStep > 0) card.classList.add('step-' + currentStep);
    }

    function nextSentence() {
        const card = document.getElementById('card');
        currentStep = 0;
        card.className = 'card';

        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * studyData.length);
        } while (newIndex === lastIndex && studyData.length > 1);
        lastIndex = newIndex;

        setTimeout(() => {
            document.getElementById('tag').innerText = studyData[newIndex].tag;
            document.getElementById('jp-mixed').innerHTML = studyData[newIndex].mixed;
            document.getElementById('kr-text').innerHTML = studyData[newIndex].kr;
            document.getElementById('jp-full').innerHTML = studyData[newIndex].full;
            document.getElementById('word-text').innerText = studyData[newIndex].words;
        }, 150);
    }

    window.onload = nextSentence;
</script>

</body>
</html>
