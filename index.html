
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티 랭귀지 헬퍼 (영/일)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .main-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-box { margin-top: 25px; padding: 20px; border-left: 5px solid #007bff; background: #f0f7ff; display: none; }
        .btn-voice { margin-top: 10px; }
        ruby rt { color: #e83e8c; font-size: 0.9em; font-weight: bold; }
        #content h3 { color: #007bff; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 class="text-center mb-4">🌐 AI 언어 도우미</h2>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="eng-tab" data-bs-toggle="pill" onclick="changeMode('en')">영어 사전</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="jp-tab" data-bs-toggle="pill" onclick="changeMode('jp')">일본어 작문</button>
        </li>
    </ul>

    <div class="input-group mb-3">
        <input type="text" id="userInput" class="form-control" placeholder="단어 또는 문장을 입력하세요" onkeyup="if(window.event.keyCode==13){handleSearch()}">
        <button class="btn btn-primary" onclick="handleSearch()">실행</button>
    </div>

    <div id="resultArea" class="result-box">
        <div id="loading" class="text-center" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div id="content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentMode = 'en'; // 기본 모드: 영어
    let currentAudio = null; // 영어 발음 오디오 객체

    // 모드 전환 함수
    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('userInput').value = '';
        document.getElementById('userInput').placeholder = (mode === 'en') ? "영어 단어를 입력하세요" : "한글 문장을 입력하세요";
    }

    // 메인 실행 함수
    async function handleSearch() {
        const input = document.getElementById('userInput').value.trim();
        if (!input) return;

        const content = document.getElementById('content');
        const resultArea = document.getElementById('resultArea');
        const loading = document.getElementById('loading');

        content.innerHTML = '';
        resultArea.style.display = 'block';
        loading.style.display = 'block';

        if (currentMode === 'en') {
            await searchEnglish(input);
        } else {
            await translateJapanese(input);
        }
        loading.style.display = 'none';
    }

    // 1. 영어 사전 기능
    async function searchEnglish(word) {
        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            const entry = data[0];

            const phonetic = entry.phonetic || (entry.phonetics.find(p => p.text)?.text) || '';
            const definition = entry.meanings[0].definitions[0].definition;
            const example = entry.meanings[0].definitions[0].example || "No example available.";

            // 오디오 찾기
            const audioData = entry.phonetics.find(p => p.audio !== "");
            const audioUrl = audioData ? audioData.audio : null;

            let audioBtn = audioUrl ? `<button class="btn btn-sm btn-outline-secondary btn-voice" onclick="playAudio('${audioUrl}')">🔊 발음 듣기</button>` : '';

            document.getElementById('content').innerHTML = `
                <h3>${entry.word}</h3>
                <p class="text-muted">${phonetic}</p>
                ${audioBtn}
                <hr>
                <p><strong>뜻:</strong> ${definition}</p>
                <p><strong>예문:</strong> <em>${example}</em></p>
            `;
        } catch (e) {
            document.getElementById('content').innerHTML = "단어를 찾을 수 없습니다.";
        }
    }

    // 2. 일본어 번역 기능 (Google Translate 무료 엔드포인트 활용)
    async function translateJapanese(text) {
        try {
            const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=ja&dt=t&q=${encodeURI(text)}`);
            const data = await response.json();
            const translatedText = data[0][0][0];

            document.getElementById('content').innerHTML = `
                <h3>🇯🇵 일본어 번역</h3>
                <p style="font-size: 1.5rem;" id="jpResultText">${translatedText}</p>
                <button class="btn btn-sm btn-outline-danger btn-voice" onclick="playJapaneseTTS('${translatedText}')">🔊 발음 듣기</button>
            `;
        } catch (e) {
            document.getElementById('content').innerHTML = "번역 중 오류가 발생했습니다.";
        }
    }

    // 3. 음성 재생 함수들
    function playAudio(url) {
        if (currentAudio) currentAudio.pause();
        currentAudio = new Audio(url);
        currentAudio.play();
    }

    function playJapaneseTTS(text) {
        // 브라우저 내장 TTS 사용
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
