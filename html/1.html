
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 카드 - 전하</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: #ffffff; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-top: 10px solid #3498db; }
        .title { font-size: 1.4rem; font-weight: 800; color: #2c3e50; margin-bottom: 20px; text-align: center; }
        .section { margin-bottom: 20px; }
        .label { font-weight: bold; color: #3498db; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .content { font-size: 1.05rem; line-height: 1.5; color: #34495e; }
        .highlight { background: #fff3cd; font-weight: bold; padding: 2px 5px; border-radius: 4px; }
        .formula { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 1.1rem; color: #e67e22; border: 1px solid #dee2e6; margin: 10px 0; }
        footer { text-align: center; font-size: 0.8rem; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">⚡ 전하 (Electric Charge)</div>

        <div class="section">
            <span class="label">정의</span>
            <div class="content">물질이 가지고 있는 전기의 양</div>
        </div>

        <div class="section">
            <span class="label">단위 및 기호</span>
            <div class="content">기호: <span class="highlight">Q</span> / 단위: <span class="highlight">[C] (쿨롱)</span></div>
        </div>

        <div class="section">
            <span class="label">전자 1개의 전하량 (암기 필수!)</span>
            <div class="formula">e = -1.602 × 10⁻¹⁹ [C]</div>
            <div class="content" style="font-size: 0.9rem; text-align: center;">※ 1[C]은 전자 약 6.25 × 10¹⁸ 개의 모임</div>
        </div>

        <div class="section">
            <span class="label">핵심 성질</span>
            <ul class="content" style="padding-left: 20px;">
                <li><span class="highlight">전하량 보존</span>: 총량은 일정함</li>
                <li>같은 극성: 반발력(미는 힘)</li>
                <li>다른 극성: 흡인력(당기는 힘)</li>
            </ul>
        </div>

        <footer>© 전기기능사 합격 노트</footer>
    </div>
</body>
</html>
