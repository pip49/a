
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 카드 - 전하</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            padding: 20px;
            box-shadow: none;
            border: 1px solid #000000;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #000000;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px solid #000000;
            padding-bottom: 8px;
        }

        .section { margin-bottom: 15px; }

        .label {
            font-weight: bold;
            color: #000000;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }

        .content {
            font-size: 1rem;
            line-height: 1.5;
            color: #000000;
        }

        .red {
            color: #ff0000;
            font-weight: bold;
        }

        .bold {
            font-weight: bold;
        }

        .formula {
            background: #ffffff;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #000000;
            border: 1px solid #000000;
            margin: 10px 0;
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #000000;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">전하 (Electric Charge)</div>

        <div class="section">
            <span class="label">1. 정의 및 단위</span>
            <div class="content">전기 현상의 원인이 되는 에너지의 양</div>
            <div class="content">기호: <span class="bold">Q</span> / 단위: <span class="red">[C] (쿨롱)</span></div>
        </div>

        <div class="section">
            <span class="label">2. 전자 1개의 전하량 (암기)</span>
            <div class="formula">e = -1.602 × 10⁻¹⁹ [C]</div>
            <div class="content">전류가 흐른다는 것은 <span class="red">자유전자</span>가 이동하는 것임</div>
        </div>

        <div class="section">
            <span class="label">3. 주요 성질</span>
            <div class="content">- 같은 극성: <span class="bold">반발력</span> (밀어냄)</div>
            <div class="content">- 다른 극성: <span class="red">흡인력</span> (당김)</div>
            <div class="content">- <span class="bold">전하량 보존</span>: 총량은 일정함</div>
        </div>

        <footer>전하량 공식 :  Q = I x t (전하량=전류x시간)</footer>
    </div>
</body>
</html>
