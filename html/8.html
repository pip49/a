
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 카드 - 법칙 비교</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            padding: 20px;
            box-shadow: none;
            border: 1px solid #000000;
        }
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #000000;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px solid #000000;
            padding-bottom: 8px;
        }
        .section { margin-bottom: 15px; }
        .label {
            font-weight: bold;
            color: #000000;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }
        .content {
            font-size: 1rem;
            line-height: 1.5;
            color: #000000;
        }
        .red { color: #ff0000; font-weight: bold; }
        .bold { font-weight: bold; }
        .formula {
            background: #ffffff;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #000000;
            border: 1px solid #000000;
            margin: 10px 0;
        }
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #000000;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">법칙 비교: 앙페르 vs 패러데이</div>

        <div class="section">
            <span class="label">1. 앙페르의 오른나사 법칙</span>
            <div class="content">전류가 흐르면 그 주변에 <span class="red">자기장</span>이 생기는 방향을 결정</div>
            <div class="content">- 엄지: <span class="bold">전류</span>의 방향</div>
            <div class="content">- 나머지 네 손가락: <span class="bold">자기장</span>의 방향</div>
        </div>

        <div class="section">
            <span class="label">2. 패러데이의 전자유도 법칙</span>
            <div class="content">자기장의 변화가 <span class="red">기전력(전기)</span>을 만드는 원리</div>
            <div class="formula">e = -N · (ΔΦ / Δt)</div>
            <div class="content">- <span class="bold">크기</span>: 자속의 변화율에 비례</div>
            <div class="content">- <span class="bold">방향(렌츠)</span>: 변화를 방해하는 방향 (-)</div>
        </div>

        <div class="section">
            <span class="label">3. 한 줄 요약</span>
            <div class="content">- 앙페르: 전류 → <span class="red">자기장 발생</span></div>
            <div class="content">- 패러데이: 자기장 변화 → <span class="red">전기 발생</span></div>
        </div>

        <footer>전기기능사 필기 요약</footer>
    </div>
</body>
</html>
