
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        .card { background: #ffffff; border: 1px solid #000; padding: 20px; border-radius: 8px; max-width: 450px; }
        .title { font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 8px; text-align: center; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 0.9rem; }
        .table th { background-color: #f4f4f4; }
        .highlight { color: #e74c3c; font-weight: bold; }
        .group-title { background: #34495e; color: white; font-weight: bold; padding: 5px; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">주요 전선 약호 및 명칭 (필수 암기)</div>

        <div class="group-title">1. 절연전선 (Insulated Wire)</div>
        <table class="table">
            <tr><th>약호</th><th>명칭</th><th>특징</th></tr>
            <tr><td><span class="highlight">IV</span></td><td>비닐 절연전선</td><td>600V 이하 옥내배선</td></tr>
            <tr><td><span class="highlight">HIV</span></td><td>내열 비닐 절연전선</td><td>2종 내열 (90℃)</td></tr>
            <tr><td><span class="highlight">OW</span></td><td>옥외용 비닐 절연전선</td><td>Out-door (옥외용)</td></tr>
            <tr><td><span class="highlight">DV</span></td><td>인입용 비닐 절연전선</td><td>Drop-wire (인입선)</td></tr>
        </table>

        <div class="group-title">2. 케이블 (Cable) 및 기타</div>
        <table class="table">
            <tr><th>약호</th><th>명칭</th><th>비고</th></tr>
            <tr><td><span class="highlight">VV</span></td><td>PVC 절연 PVC 외장</td><td>비닐(V) + 비닐(V)</td></tr>
            <tr><td><span class="highlight">CV</span></td><td>가교 폴리에틸렌 비닐 외장</td><td>가장 많이 쓰임</td></tr>
            <tr><td><span class="highlight">MI</span></td><td>미네랄 인슐레이션</td><td>내화/내열 우수</td></tr>
            <tr><td><span class="highlight">GV</span></td><td>접지용 비닐 절연전선</td><td>Ground (접지)</td></tr>
        </table>
    </div>
</body>
</html>
