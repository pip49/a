
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일에서 화면 크기에 맞게 조절해주는 코드입니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. 카드를 중앙으로 보내고 너비를 유연하게 조절 */
        .card {
            background: #ffffff;
            border: 1px solid #000;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;  /* 최대 너비 */
            width: 90%;       /* 모바일에서는 화면의 90% 차지 */
            margin: 20px auto; /* 상하 여백 20px, 좌우 자동(중앙 정렬) */
            box-sizing: border-box; /* 패딩이 너비에 포함되도록 설정 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            text-align: center;
            color: #2c3e50;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            table-layout: fixed; /* 표가 화면 밖으로 나가지 않게 고정 */
        }

        .table th, .table td {
            border: 1px solid #ddd;
            padding: 10px 5px;
            text-align: center;
            font-size: 0.95rem; /* 가독성을 위해 폰트 크기 살짝 키움 */
            word-break: keep-all; /* 단어가 잘리지 않게 설정 */
        }

        .table th { background-color: #f4f4f4; font-weight: bold; }
        .highlight { color: #e74c3c; font-weight: bold; }

        .group-title {
            background: #34495e;
            color: white;
            font-weight: bold;
            padding: 8px;
            margin-top: 20px;
            font-size: 1rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">주요 전선 약호 및 명칭</div>

        <div class="group-title">1. 절연전선 (Insulated Wire)</div>
        <table class="table">
            <colgroup>
                <col style="width: 25%;">
                <col style="width: 40%;">
                <col style="width: 35%;">
            </colgroup>
            <tr><th>약호</th><th>명칭</th><th>특징</th></tr>
            <tr><td><span class="highlight">IV</span></td><td>비닐 절연</td><td>옥내배선</td></tr>
            <tr><td><span class="highlight">HIV</span></td><td>내열 비닐</td><td>90℃ 내열</td></tr>
            <tr><td><span class="highlight">OW</span></td><td>옥외용 비닐</td><td>Outdoor</td></tr>
            <tr><td><span class="highlight">DV</span></td><td>인입용 비닐</td><td>Drop-wire</td></tr>
        </table>

        <div class="group-title">2. 케이블 (Cable) 및 기타</div>
        <table class="table">
            <colgroup>
                <col style="width: 25%;">
                <col style="width: 40%;">
                <col style="width: 35%;">
            </colgroup>
            <tr><th>약호</th><th>명칭</th><th>비고</th></tr>
            <tr><td><span class="highlight">VV</span></td><td>PVC 절연/외장</td><td>V+V</td></tr>
            <tr><td><span class="highlight">CV</span></td><td>가교 폴리에틸렌</td><td>가장 빈출</td></tr>
            <tr><td><span class="highlight">MI</span></td><td>미네랄 인슐레이션</td><td>내화 우수</td></tr>
            <tr><td><span class="highlight">GV</span></td><td>접지용 비닐</td><td>Ground</td></tr>
        </table>
    </div>
</body>
</html>
