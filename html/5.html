
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 카드 - 병렬 합성저항</title>
    <style>
        /* 전체 배경 설정 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 카드 디자인: 그림자와 상단 색상 띠를 모두 제거 */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            padding: 25px;
            /* 그림자 없음 */
            box-shadow: none;
            /* 모든 면 동일한 얇은 검정 테두리 */
            border: 1px solid #333333;
        }

        /* 제목: 색상을 검정으로 통일 */
        .title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #000000;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .section { margin-bottom: 20px; }

        /* 라벨: 강조 색상을 차분하게 변경 */
        .label {
            font-weight: bold;
            color: #555555;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 5px;
        }

        .content { font-size: 1rem; line-height: 1.6; color: #333333; }

        /* 하이라이트: 연한 회색으로 변경 */
        .highlight {
            background: #f0f0f0;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* 공식 박스: 깔끔한 강조 */
        .formula {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #000000;
            border: 1px solid #dddddd;
            margin: 10px 0;
        }

        .tip {
            font-size: 0.85rem;
            color: #666666;
            border-left: 2px solid #333333;
            padding-left: 10px;
            margin-top: 5px;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #999999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">📉 병렬 합성저항 (R<sub>p</sub>)</div>

        <div class="section">
            <span class="label">기본 원리</span>
            <div class="content">저항을 병렬로 연결할수록 <span class="highlight">전체 저항값은 작아집니다.</span></div>
        </div>

        <div class="section">
            <span class="label">방법 1. 저항이 2개일 때 (핵심)</span>
            <div class="formula">R = (R₁ × R₂) / (R₁ + R₂)</div>
            <div class="tip">암기팁: "합분의 곱" (더한 값 분의 곱한 값)</div>
        </div>

        <div class="section">
            <span class="label">방법 2. 저항이 n개일 때</span>
            <div class="formula">1/R = 1/R₁ + 1/R₂ + ...</div>
        </div>

        <footer>전기기능사 필기 요약</footer>
    </div>
</body>
</html>
