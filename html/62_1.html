
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        .comparison-card {
            border: 2px solid #34495e;
            border-radius: 10px;
            padding: 20px;
            max-width: 500px;
            background-color: #ffffff;
            font-family: 'Pretendard', sans-serif;
        }
        .comp-title {
            background-color: #34495e;
            color: white;
            text-align: center;
            padding: 10px;
            margin: -20px -20px 20px -20px;
            border-radius: 8px 8px 0 0;
            font-size: 1.1rem;
        }
        .comp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .comp-item {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
        .comp-header {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #3498db;
        }
        .point { font-size: 0.85rem; line-height: 1.5; color: #555; }
        .bad { color: #e74c3c; font-weight: bold; }
        .good { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <div class="comparison-card">
        <div class="comp-title">분포권 vs 집중권 (핵심 비교)</div>
        <div class="comp-grid">
            <div class="comp-item">
                <span class="comp-header">집중권 (Concentrated)</span>
                <div class="point">
                    • 1극 1상당 슬롯 수 = 1개<br>
                    • 한 곳에 <b>몰빵</b>해서 감음<br>
                    • 유도 기전력은 <span class="good">큼</span><br>
                    • 전압 파형이 <span class="bad">나쁨</span>
                </div>
            </div>
            <div class="comp-item">
                <span class="comp-header">분포권 (Distributed)</span>
                <div class="point">
                    • 1극 1상당 슬롯 수 ≥ 2개<br>
                    • 여러 슬롯에 <b>나눠서</b> 감음<br>
                    • 유도 기전력은 <span class="bad">작음</span><br>
                    • 전압 파형이 <span class="good">매우 좋음</span>
                </div>
            </div>
        </div>
        <div style="margin-top: 15px; font-size: 0.9rem; background: #f9f9f9; padding: 10px; border-left: 4px solid #3498db;">
            <b>💡 기억할 점:</b> 실제 발전기는 전압이 조금 낮아지더라도 <b>파형이 깨끗한 것이 훨씬 중요</b>하기 때문에 무조건 <b>분포권</b>을 사용합니다.
        </div>
    </div>
</body>
</html>
